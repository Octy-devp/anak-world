id: west_seraphion
name: 塞拉菲昂神聖帝國
layer: empire
region: 西部
empire: 無
parent_id: ankora
description: >
  位於安納克大陸西部的龐大帝國，曾經的霸權心臟。
  名義上由六大選帝侯選舉皇帝，但自巴爾塔薩的後裔以來，瓦羅蘭特皇室已經虛位化。
  現任皇帝被稱為「夕照帝」，直轄領地僅剩維特魯斯周邊五十里的狹小區域，連宮殿的修繕費用都需要向教廷借債。
  教廷擁有加冕權與廢立權（《大憲章》第754年確立），西派教廷主張「加冕權至上」，認為教權高於皇權。
  六大選帝侯——瓦羅蘭特皇室、格蘭迪斯大公、莫爾根國王、西爾伯弗羅斯特邊疆大公、五大特別市聯盟（The Pentapolis）、護憲封建議會——各自為政，私戰不斷。
  
  (一) 瓦羅蘭特皇室：名義上的帝國統治者，實質上的黃金囚徒。第825年在位利奧·瓦羅蘭特三世，直轄領地「夕照畿」僅包括維特魯斯內城、外城貧民窟及周邊五十里農村。
  
  (二) 格蘭迪斯大公國：佔據中部平原廣袤麥田，實質糧食壟斷者。奧托·馮·格蘭迪斯被稱為「麥田之主」，宮殿「金穗堡」建於古代堤壩遺跡之上。
  
  (三) 莫爾根王國：控制南方海岸三百里海岸線，塞拉芬·莫爾根被稱為「私掠王」。王宮「潮音宮」建於海上礁岩之中，地面由明晰海水晶鋪成。
  
  (四) 西爾伯弗羅斯特邊疆大公國：帝國北方盾牌，直接面對阿爾比諾克拉西亞的冰壁防線。伊薩克·西爾伯弗羅斯特被稱為「冰牆大公」，頒布《霜戒法》實行極端軍事化神權制度。
  
  (五) 五大特別市聯盟：由維特魯斯聖座、雙子門市、焰紋市、鹽白城與阿申斯塔特五城組成，共享一個選帝侯投票權。第825年在位執政官為卡西烏斯·鐘塔（焰紋市冷鍛技師出身）。
  
  (六) 護憲封建議會：由數十名小伯爵、男爵與騎士領主聯合組成，推選護憲伯爵作為代表。第825年在位護憲伯爵為艾德里安·馮·小赫斯，其封地「小赫斯領」僅有一座石塔與三百畝葡萄園。

  除六大選帝侯外，帝國邊境尚有兩個非選帝侯邊境公國作為防禦補充：
  東境邊防公國（Aurora Castra，奧羅拉堡）扼守魯普圖斯隘口以南，承擔凱撒里克方向的邊境壓力；
  席爾瓦因邊境領（Radix Specula，拉迪克斯守望修道院）監控艾爾達拉世界樹森林邊緣，由教廷任命的邊境修道院長管理，森民與人類嚴格隔離。
  皇帝無法獨立行使任何實質性權力，除非能說服至少四位選帝侯。
  到第七世紀末，帝國經濟的三大支柱無一倖存：隕鐵礦脈枯竭、神恩券濫發貶值、小冰期導致農作物減產四成。
  格蘭迪斯大公掌握中部平原麥田，宮殿「金穗堡」建於古代堤壩遺跡之上，地窖儲糧足以供應維特魯斯三年。
  莫爾根國王控制南方海岸，私掠艦隊懸掛教廷旗幟進行海上劫掠。
  西爾伯弗羅斯特邊疆大公與白霜長期作戰，邊境防線屢遭突破。
  五大特別市聯盟由五城執政官代表，第825年在位者為卡西烏斯·鐘塔（焰紋市冷鍛技師出身）。
  護憲封建議會由護憲伯爵艾德里安·馮·小赫斯代表，其封地小赫斯領僅有一座石塔與三百畝葡萄園。
  宗教為普世教會西派，信奉創世主阿薩，創造了「神聖語」將技術詞彙宗教化。
  到了第825年，塞拉菲昂已淪為一個美麗而虛弱的影子，帝國議會因議事癱瘓而解散，法律形同虛設，神恩券在黑市上的價值已低於印刷花費。

