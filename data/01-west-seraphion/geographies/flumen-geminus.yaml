# ── 身份錨定（必填）──
id: flumen_geminus
name: 傑米努斯大河
layer: geography
region: 中央
empire: 無
parent_id: ankora

# ── 敘事錨定（必填）──
description: >
  傑米努斯大河（Flumen Geminus，意為「雙生之河」）是安納克大陸的母親河、東西動脈與文明搖籃，
  東西貫穿整片大陸，是所有帝國與城邦的生命線。

  上游（西部高地）發源於靠近世界樹區域的崇山峻嶺之間，河道深切峽谷，水流清澈湍急，落差極大，
  水聲如雷，魚類稀少但體型巨大。兩岸峭壁林立，僅有山羊與少數冒險者能通行。

  西段接納來自世界樹森林的希爾薇恩河，北段接納來自約恩維德山脈的約恩維德河，
  三河於中游交匯。交匯後河道驟然變寬，流速減緩，泥沙沉積形成廣袤的中央沖積平原。
  此處兩岸無數支流與沼澤交錯，季節性氾濫帶來肥沃淤泥，農田綠浪翻滾。

  河流從魯普圖斯隘口切穿怒嘯山脈，隘口段兩岸峭壁百米高，水流極速，漩渦與暗礁密布，
  只有經驗最豐富的船夫才能通過。魯普圖斯隘口是東西唯一的便捷水路，也是東西貿易的咽喉。

  下游（東部平原）河道分叉，沙洲密布，鹹淡水交匯，漁業發達，蘆葦叢生。
  無數渡口、水車磨坊、漁村與河盜據點星羅棋布於兩岸。
  大河最終注入東部海洋，與風息群島共享同一海域。

  人文上，傑米努斯河是東西貿易的命脈，塞拉菲昂的糧食與凱撒里克的隕鐵經由水路運輸。
  魯普圖斯隘口段的船夫形成獨特的「峽谷行會」，世代相傳險灘航線的秘密。
  沖積平原段的農民每年秋季舉行「淤泥祭」，感謝河流帶來的肥沃土壤。

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 上游清冽的礦物味
    - 中游泥沙與腐殖土的濕潤氣息
    - 下游鹹淡水混合的腥味
    - 隘口段潮濕岩壁的霉味
    - 兩岸蘆葦的甜腥
  light: >
    上游峡谷的幽綠水光折射、中游平原的開闊天光倒影、
    下游三角洲的夕照金紅、隘口段的狹窄一線天
  temperature: >
    上游冰涼，中游溫和，下游受海洋影響偏暖；
    冬季北岸結冰而南岸不結，南北兩岸溫差顯著
  sound:
    - 上游湍急的轟鳴
    - 中游緩流的低語
    - 船槳划水的節奏聲
    - 漁歌與河盜的警哨
    - 水車磨坊的吱嘎轉動

# ── 屬性標籤（可選但建議填寫）──
properties:
  controlled_by: 無
  access_level: public
  danger_level: medium
  population: null

# ── 關係即通道（connections）──
connections:
