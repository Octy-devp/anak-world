    location: 中央段峽谷
    description: 怒嘯山脈中唯一的東西水路通道，水流極速，漩渦與暗礁密布，只有經驗最豐富的船夫才能通過
  - item: landmark
    name: 三河交匯口
    location: 中游沖積平原西緣
    description: 傑米努斯大河、希爾薇恩河與約恩維德河交匯之處，淡金、泥黃與冰藍三色河水在此交融
  - item: npc
    name: 峽谷行會
    location: 魯普圖斯隘口段
    description: 世代相傳險灘航線秘密的船夫行會，掌握隘口段唯一的可靠航道圖
  - item: resource
    name: 河砂金
    location: 下游河床與沙洲
    description: 從西部高地沖刷而來的細微金砂，是沿岸漁民的副業收入來源

