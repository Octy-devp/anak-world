# ── 敘事錨定（必填）──
description: >
  帕魯斯沼澤（拉丁：Palus Nebulae，意為「迷霧之沼」）位於中央沖積平原東部，
  傑米努斯河主河道東側的一片低洼地帶。
  這裡是大洪水前傑米努斯河的古河道遺跡，河道改道後遺留的牛軛湖與濕地群終年積水，
  冬季濕冷多霧，夏季悶熱、蚊蟲滋生、瘴氣瀰漫。

  此地法理上屬於格蘭迪斯大公國的領地，但真正的張力並非「領土爭奪」，而是「水權戰爭」。

  雙子門市（Twin Gates）位於沼澤西方約一日馬程處，坐落於傑米努斯河主河道與一條南北向支流的交匯處。
  這座城市依賴傑米努斯河主河道供水，其運河系統與七座青銅大橋的水力機構都需要穩定的河流水位。
  然而，格蘭迪斯大公國控制著傑米努斯河主河道北岸的上游麥田區，
  並在北岸修築了一系列石砌堰壩與灌溉溝渠。
  每逢乾旱年份，這些堰壩優先將水引向格蘭迪斯的麥田，
  導致主河道整體水位銳減——不是斷流，而是降到剛好維持航運的最低水位。
  對雙子門市而言，這就是「功能性乾旱」：運河淤淺、磨坊水輪停擺、市民被迫排隊領取教廷水承載者配給的「神聖之水」。

  對雙子門市而言，帕魯斯沼澤是它的**命根**。
  沼澤底下蘊藏著古河道遺留的地下水與季節性積水。
  第810年以來，雙子門市的商人行會祕密資助工程師與走私者，
  在沼澤西緣開鑿暗渠、建立人力泵站，試圖將沼澤水引入城市運河系統作為備用水源，
  同時排乾部分低洼地以開闢秘密農田。
  這些工程夜間進行，白天則偽裝成「漁民聚落」或「蘆葦採集站」。

  格蘭迪斯大公國對此並非全無察覺——麥穗軍團的巡邏隊時常在沼澤北緣發現陌生的排水溝與木樁——
  但奧托·馮·格蘭迪斯選擇睜一隻眼閉一隻眼。
  對他而言，沼澤是天然的東方屏障；只要雙子門市不敢公開挑戰水權，
  他樂於讓這座自由市在慢性窒息中繼續為他的糧食貿易繳納過路稅。

  教廷在沼澤地帶的立場更為複雜：普世教會西派的影響力不如此地格蘭迪斯的世俗權力，
  但大救濟院仍維持著一座小型邊境禮拜堂，並派遣修士進入沼澤「救治瘴氣病患」——
  實則是監控雙子門市的祕密水利工程，評估其對維特魯斯聖座水權的潛在威脅。
  格蘭迪斯與教廷在此形成微妙的制衡：大公需要教會背書其水權的「神聖性」，
  而教廷則藉此換取對雙子門市商人公會的影響力。

  大洪水前的青銅時代，傑米努斯河的河道曾經過此處，
  留下了被淹沒的古代村落與堤壩遺跡。

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 腐殖質與泥炭的酸腐氣息 # inferred: true
    - 夏季瘴氣的甜膩惡臭 # inferred: true
    - 冬季濃霧中的濕霉味 # inferred: true
    - 蚊蟲與沼澤植物的腥甜 # inferred: true
    - 遠處麥田飄來的淡淡穀香 # inferred: true
  light: >
    終年迷霧瀰漫，光線被水汽折射成慘白或灰綠色；
    午後偶有稀疏陽光穿透霧層，在沼澤水面形成斑駁銀斑。
    黃昏時分，霧氣吸收夕照呈現病態的橘紅，
    入夜後僅剩零星的走私者燈火在蘆葦叢中忽明忽滅。 # inferred: true
  temperature: >
    冬季濕冷刺骨，寒氣透過濕氣滲入骨髓；
    夏季悶熱難耐，暑氣與濕氣交織令人窒息；
    春秋短暫而陰涼，白晝與黑夜的溫差被濃霧抹平。 # inferred: true
  sound:
    - 氣泡從泥底升起的咕嚕聲 # inferred: true
    - 水鳥的啼鳴與撲翅聲 # inferred: true
    - 風吹蘆葦的沙沙聲 # inferred: true
    - 夜間蛙鳴與蟲吟 # inferred: true
    - 遠處傳來的隱約人聲或狗吠 # inferred: true
    - 夏季蚊蟲的嗡嗡聲 # inferred: true

