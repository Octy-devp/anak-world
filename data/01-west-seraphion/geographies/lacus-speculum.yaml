# ── 身份錨定（必填）──
id: lacus_speculum
name: 斯佩庫拉湖（鏡湖）
layer: geography
region: 北部/中央交界
empire: 塞拉菲昂神聖帝國
parent_id: ankora

# ── 敘事錨定（必填）──
description: >
  鏡湖坐落於怒嘯山脈北麓與約恩維德山脈南端交會的高山谷地中，
  是安納克大陸中部偏北的一座高山冰蝕湖。
  海拔約 2000–2500 米，冬季湖面完全冰封，夏季冰緣逐漸消退，
  露出如鏡面般平靜的湖水，故得拉丁名 Lacus Speculum（鏡湖）。
  湖水經地下溶洞與夏季融雪補給傑米努斯大河的上游支流，
  是下游維特魯斯與中央沖積平原夏季水量的重要來源。
  春分與秋分的黎明時分，高海拔稀薄空氣與懸浮冰晶產生複雜的光學折射，
  被當地修士解讀為「阿薩的預言」。
  鏡湖位於塞拉菲昂神聖帝國境內，屬西爾伯弗羅斯特邊疆大公國實際控制的北部水源補給區，
  但北境諸邦的霜生部落偶爾在冬季越過約恩維德山脈南麓的薄弱點接近湖區，
  構成持續的邊境緊張。

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 高海拔稀薄冷冽的空氣
    - 冰蝕湖水的礦物清冽  # inferred: true
    - 凍土與高山苔原的泥土氣息  # inferred: true
    - 遠處針葉林飄來的淡淡松脂  # inferred: true
  light: >
    高海拔無遮蔽的強烈天光，
    春分與秋分黎明時冰晶折射出的彩虹光暈與環地平弧
  temperature: >
    終年寒冷，冬季極寒冰封，
    夏季冰緣消退但湖岸仍有積雪，夜間氣溫驟降至冰點以下
  sound:
    - 永恆風嘯掠過冰面與裸岩的尖嘯  # inferred: true
    - 春季融雪時地下溶洞的水流迴響
    - 遠處約恩維德山脈南麓的風聲  # inferred: true

# ── 屬性標籤（可選但建議填寫）──
properties:
  access_level: restricted
  danger_level: medium
  controlled_by: 西爾伯弗羅斯特邊疆大公國
  religion: 普世教會西派（創世主阿薩）；當地修士解讀冰晶折射為「阿薩的預言」  # inferred: true
  population: 0

