# ── 內容物（contents）──
contents:
  - item: landmark
    name: 魯普圖斯隘口
    location: 山脈中央段
    description: 傑米努斯河切穿山脈的唯一通道，設有邊境稅站與走私密道
  - item: resource
    name: 隕鐵礦脈
    location: 山脈深處
    description: 安納克文明的技術基礎，帶有暗紅色紋路的神秘金屬
  - item: landmark
    name: 黑曜石守望者修道院
    location: 山脈深處（確切位置不為人知）
    guardian: 黑曜石守望者
    description: 隱修士與黑曜石守望者的居所，冷鍛隕鐵技術的源頭
  - item: landmark
    name: 瞭望塔
    location: 山脊線多處
    description: 東西兩大帝國設立的邊境瞭望塔
  - item: landmark
    name: 東坡阻擊戰遺跡
    location: 魯普圖斯隘口東端陡坡
    description: >
      第727年東遷期間，馬庫斯主力在此利用陡坡地形阻擋追兵。
      地表散落著生鏽的箭鏃、碎裂的馬蹄鐵與風化的盾牌殘片，
      部分岩壁上留有當年臨時挖掘的步兵掩體溝槽。  # inferred: true

# ── 歷史事件（events）──
events:
  - id: great_flood
    year: 0
    name: 大洪水
    description: 地殼撕裂形成怒嘯山脈的褶皺山體，隕鐵隨古代隕石墜入山脈深處。大陸的傷疤同時催生了中央山脈與南部深淵
  - id: obsidian_pact
    year: 328
    name: 黑曜石之約
    description: 馬爾施克羅內領的使者登上怒嘯山脈最高峰，與黑曜石守望者達成協議，守望者同意大規模傳授冷鍛隕鐵技術
  - id: iron_crown_uprising
    year: 726
    name: 鐵冠起義
    description: 鐵冠騎士團攻佔聖鑰院，教廷分裂為東西兩派，間接影響山脈兩側的政治格局
  - id: ruptus_pass_east_slope_battle
    year: 727
    name: 東坡阻擊戰痕跡
    description: >
      第727年春，馬庫斯親王率東遷主力搶佔魯普圖斯隘口東端陡坡，
      利用背風乾燥、岩石裸露的險峻地形阻擋追兵。
      至今東坡仍可見當年騎士衝鋒遺留的馬蹄鐵碎片與箭鏃，
      以及臨時挖掘的步兵掩體溝槽。  # inferred: true

