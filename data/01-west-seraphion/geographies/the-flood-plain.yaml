    type: conceptual
    direction: 東方
    description: 怒嘯山脈西麓的融雪是平原水源的根本保障
  - target: eldara_worldtree
    type: conceptual
    direction: 南方
    description: 世界樹的樹雨與蒸騰作用調節了平原的微氣候，使此處比同緯度更濕潤
  - target: west_seraphion
    type: conceptual
    direction: 全境
    description: 平原是塞拉菲昂帝國的糧食核心，格蘭迪斯大公以此壟斷政治籌碼
  - target: palus_nebulae
    type: physical
    direction: 北方
    description: 沼澤是中央沖積平原北緣的低洼過渡帶，雨季時兩者幾乎連為一體

