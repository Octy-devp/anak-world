    type: physical
    direction: 北界匯入
    description: 約恩維德河從北方帶來冰川礦物質，在平原北側匯入，使北岸土壤偏砂質
  - target: sylvaine_river
    type: physical
    direction: 南界匯入
    description: 希爾薇恩河從世界樹森林帶來腐殖質與微量元素，在平原南側匯入，使南岸土壤偏黑黏
