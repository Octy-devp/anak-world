# ── 內容物（contents）──
contents:
  - item: landmark
    name: 五座水力磨坊
    location: 河道兩岸
    description: >
      沿傑米努斯河支流排列的五座大型水力磨坊，每座配有巨大的木製水輪與石磨。
      其中最大的一座「大公磨坊」由格蘭迪斯家族直接控股，優先處理領地稅糧。 # inferred: true
  - item: resource
    name: 磨麥壟斷權
    location: 磨坊主行會帳房
    description: >
      格蘭迪斯大公授予的區域磨麥壟斷執照，
      農民不得私設磨坊，違者處以沒收麥種之刑。 # inferred: true
  - item: npc
    name: 老磨坊主赫爾曼
    location: 第三號磨坊
    description: >
      年逾六十的磨坊技師，據稱能僅憑石磨聲響判斷麥粒濕度與出粉率。
      他暗中同情農民，常在夜間以「損耗」為名少抽半成磨麥費。 # inferred: true

