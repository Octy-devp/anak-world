# ── 身份錨定（必填）──
id: molinaria
name: 莫利納里亞磨坊鎮
layer: settlement
region: 格蘭迪斯大公國境內
empire: 塞拉菲昂神聖帝國
parent_id: west_seraphion

# ── 敘事錨定（必填）──
description: >
  莫利納里亞磨坊鎮座落於傑米努斯河一條支流的水力湍急處，
  是格蘭迪斯大公國境內為周邊農村磨麥的集中加工點。
  鎮上五座水力磨坊沿河道排列，巨大的木製水輪終年轉動，
  將周邊數十個村莊的小麥與大麥磨成麵粉。

  磨坊主們向格蘭迪斯大公繳納「水輪稅」以換取壟斷經營權，
  農民則以實物支付磨麥費用——通常是每十袋麥子抽成一袋作為報酬。
  每逢秋收季節，運麥的牛車在河邊道路上排成長龍，
  塵土與麥糠飛揚，是中央平原上特有的繁忙景象。 # inferred: true

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 新磨麵粉的乾燥穀香與麥糠粉塵味
    - 水車木軸與齒輪潤滑油的亞麻氣息 # inferred: true
    - 河道濕泥與水生植物的潮濕氣味 # inferred: true
    - 秋季運麥牛車揚起的塵土與牲畜糞便氣息 # inferred: true
  light: >
    白天磨坊內部僅有高挑窗戶透入的垂直光柱，空氣中懸浮的麥糠如金色微塵；
    黃昏時水輪剪影映在河面上，夕照將木製建築染成琥珀色；
    夜間磨坊靠油脂燈與爐火照明，光影在水車葉片上跳動。 # inferred: true
  temperature: >
    磨坊內部終年涼爽，石砌牆壁與河流水氣調節溫度；
    夏季水車濺起的水霧帶來涼意，冬季河風穿過木造縫隙令人瑟縮；
    爐房烘烤麵包處燥熱異常，與磨粉車間形成鮮明對比。 # inferred: true
  sound:
    - 水車木輪轉動時的沉重軋軋聲與水流傾瀉聲
    - 石磨碾壓麥粒的沉悶摩擦聲 # inferred: true
    - 農民卸貨時的吆喝與牛車制動的吱嘎聲 # inferred: true
    - 秋季長龍隊伍中孩童嬉戲與婦女閒談的嘈雜人聲 # inferred: true

