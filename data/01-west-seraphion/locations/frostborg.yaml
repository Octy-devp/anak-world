# ── 身份錨定（必填）──
id: frostborg
name: 弗羅斯特堡
layer: settlement
region: 西爾伯弗羅斯特邊境
empire: 塞拉菲昂神聖帝國
parent_id: west_seraphion

# ── 敘事錨定（必填）──
description: >
  弗羅斯特堡是《霜戒法》頒布後由邊境村莊改造而成的地下冰窖軍事堡壘，
  坐落於霜尖塔要塞東北方的凍土帶上，直接面對白霜的冰壁防線壓力。

  第790年伊薩克大公頒布《霜戒法》後，邊境村莊全面軍事堡壘化，
  地下挖掘深達十米的冰窖以躲避白霜法師的寒法攻擊。
  弗羅斯特堡的原村民被編入軍事編制，男子服冰防役，女子編織防寒毛氈與熬製草藥。
  堡壘以黑曜石與凍土磚砌成外牆，覆蓋冰層以增強防禦，
  地下冰窖網絡儲存糧食、草藥與凍原苔蘚燃料，是北方生存的最後保障。

  到了第825年，弗羅斯特堡已成為西爾伯弗羅斯特邊境防線的重要節點，
  但帝國議會癱瘓後的軍費與糧食斷絕使其物資日益枯竭。
  施塔爾傭兵聯盟的一支小隊駐紮在堡壘外圍的廢棄哨塔中，
  實際上分享著堡壘的補給線與巡邏範圍，使伊薩克的命令難以徹底執行。 # inferred: true

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 深埋冰窖中陳年積雪的壓縮空氣味
    - 凍土磚與黑曜石在極寒中的無機冷冽氣息
    - 防寒毛氈的羊毛脂與動物油脂氣味 # inferred: true
    - 熬製草藥的苦澀根莖氣息 # inferred: true
    - 傭兵營地中劣質烈酒與煙草的酸腐氣味 # inferred: true
  light: >
    堡壘地表僅有極北長夜的慘白微光與冰壁反射的冷藍；
    地下冰窖深處僅有動物油脂燈的搖曳昏黃；
    瞭望塔上的烽火台在警戒時投射出斷續的橘紅光柱。 # inferred: true
  temperature: >
    終年極寒，室外溫度常在零下三十度以下；
    冰窖深處因地熱溝渠維持穩定低溫，堡壘內靠燃燒凍原苔蘚與動物糞便勉強維持生存溫度。 # inferred: true
  sound:
    - 極北永恆風嘯穿過瞭望塔與射擊孔的尖嘯
    - 冰防役士兵在城牆上巡邏的鐵靴踏雪聲
    - 地下冰窖深處冰層緩慢擠壓的呻吟 # inferred: true
    - 傭兵營地中的低聲咒罵與骰子滾動 # inferred: true
    - 遠方冰墓區偶爾傳來的冰裂細響 # inferred: true

