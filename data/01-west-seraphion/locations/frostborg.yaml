# ── 關係即通道（connections）──
connections:
  - target: frostspire
    type: physical
    direction: 西南
    hidden: false
    description: >
      沿凍土巡邏道向西南約一日半行程可達霜尖塔要塞；
      弗羅斯特堡的補給與命令傳遞皆依賴此通道，但冬季暴風雪時常中斷聯繫。 # inferred: true
  - target: isgrav
    type: conceptual
    direction: 東北方
    hidden: false
    description: >
      弗羅斯特堡與伊斯格拉夫冰墓之間的凍土帶是冰防役巡邏的核心區域，
      士兵們每日往返於堡壘與冰墓之間，監視白霜動向。 # inferred: true

# ── 內容物（contents）──
contents:
  - item: landmark
    name: 十米深冰窖網絡
    location: 堡壘地下
    guardian: 冰防役工兵隊
    description: >
      由《霜戒法》下令挖掘的地下冰窖網絡，深達十米，
      以躲避白霜法師的寒法攻擊。
      冰窖中儲存糧食、草藥與凍原苔蘚燃料，是弗羅斯特堡生存的最後保障。
  - item: landmark
    name: 黑曜石凍土堡牆
    location: 堡壘外圍
    guardian: 冰防役駐軍
    description: >
      以黑曜石與凍土磚砌成的堡壘外牆，表面覆蓋冰層以增強防禦。
      牆上設有射擊孔與瞭望台，是抵禦白霜滲透的第一道防線。 # inferred: true
  - item: npc
    name: 弗羅斯特堡指揮官
    location: 堡壘指揮廳
    guardian: 冰防役禁衛軍
    description: >
      第825年在任的弗羅斯特堡軍事指揮官，負責執行《霜戒法》與冰防役調度。
      在帝國議會癱瘓、物資斷絕的困境下，不得不與施塔爾傭兵聯盟妥協，
      實質上淪為伊薩克大公與傭兵之間的緩衝人。 # inferred: true

