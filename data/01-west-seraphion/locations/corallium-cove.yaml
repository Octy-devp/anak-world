  population: 800  # 採珠人、雕琢工匠與家眷約七百至九百人；inferred: true
  settlement_type: village
  wonders: []

# ── 關係即通道（connections）──
connections:
  - target: pearl_bay_village
    type: physical
    direction: 東方近處
    description: >
      與珍珠灣漁村僅隔一道低矮礁岩岬角，步行約一刻鐘可達，
      兩地漁民時常互通物資，珊瑚灣的珍稀紅珊瑚與珍珠灣的大宗牡蠣形成互補。 # inferred: true
  - target: palace_of_tidal_song
    type: conceptual
    direction: 宗主
    description: >
      定期向潮音宮繳納珊瑚與珍珠稅賦，但因規模較小，
      聖焰私掠艦隊的盤剝程度遠低於珍珠灣漁村。 # inferred: true
  - target: wind_isles
    type: conceptual
    direction: 南方海域
    description: >
      傳聞有利貝塔尼亞走私小船利用夜間潮汐繞過莫爾根巡邏線，
      在此以金幣換取紅珊瑚與上等珍珠，再運往風息群島高價出售。 # inferred: true

# ── 內容物（contents）──
contents:
  - item: resource
    name: 紅珊瑚礁床
    location: 海灣淺海與礁池
    description: >
      色彩斑斕的紅珊瑚群聚生於淺海礁石之上，是科拉利烏姆最珍貴的資源。
      珊瑚枝經雕琢後可作為教廷樞機的權杖鑲飾與維特魯斯貴族的珠寶原料。 # inferred: true
  - item: resource
    name: 潮間帶珍珠貝
    location: 灣內礁池
    description: >
      礁池中密集分布的小型珍珠貝，產出量雖不及珍珠灣，
      但顆粒圓潤、色澤偏粉紅，在利貝塔尼亞黑市上頗受歡迎。 # inferred: true
  - item: landmark
    name: 珊瑚雕琢工坊
    location: 海灣北岸避風處
    description: >
      幾座以礁岩與廢船板搭建的簡陋工坊，工匠們以金屬鑿刀與砂輪
      將紅珊瑚雕琢成珠寶與宗教飾品，粉塵使工匠的手指終年泛紅。 # inferred: true
  - item: npc
    name: 老採珠人納西索
    location: 礁岩岬角潛水點
    description: >
      年逾五十的潛水採珠人，據稱能在水下閉氣超過四分鐘，
      熟知每一處礁池的潮汐規律與珍珠貝分布。他暗中為利貝塔尼亞走私者引路，
      換取異國香料與不受教廷監控的金幣。 # inferred: true

