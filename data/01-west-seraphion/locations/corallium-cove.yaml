# ── 身份錨定（必填）──
id: corallium_cove
name: 科拉利烏姆珊瑚灣
layer: settlement
region: 莫爾根王國境內
empire: 塞拉菲昂神聖帝國
parent_id: west_seraphion

# ── 敘事錨定（必填）──
description: >
  科拉利烏姆珊瑚灣位於莫爾根王國南方海岸一處隱蔽的小海灣，
  與珍珠灣漁村僅隔一道低矮的礁岩岬角。
  這裡的淺海遍布色彩斑斕的珊瑚礁，潮間帶的礁池中盛產珍珠貝與稀有紅珊瑚，
  是莫爾根王國海產珍貿易鏈條上不起眼卻不可或缺的一環。

  灣內居民不足千人，多為潛水採珠人與珊瑚雕琢工匠，
  他們以驚人的肺活量與對潮汐規律的精準掌握著稱。
  由於珊瑚灣規模太小，聖焰私掠艦隊僅在此設有一名稅吏與兩名衛兵，
  徵稅方式也比珍珠灣寬鬆——這使得珊瑚灣成為漁民與走私者
  私下交易的灰色地帶，利貝塔尼亞金幣在此悄然流通。 # inferred: true

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 退潮後礁池中海藻與珊瑚的濃烈鹹腥
    - 珍珠貝肉曬乾後的淡淡鈣質甜香 # inferred: true
    - 珊瑚雕琢工坊中研磨粉塵的細膩礦物味 # inferred: true
    - 走私者暗中交易時點燃的異國香料菸草氣息 # inferred: true
  light: >
    正午陽光穿透淺海，將珊瑚礁折射為晃動的紅橙與碧藍色斑紋，投射於白沙海底；
    黃昏時分海水呈現深邃的紫羅蘭色，與天際的橘紅暮光交融；
    夜間僅有採珠人頭戴的油脂燈籠在漆黑水面上飄浮，如螢火蟲群游弋於海灣。 # inferred: true
  temperature: >
    海風終年溫和，夏季涼爽，冬季罕見霜凍；
    但潛水採珠人長時間浸泡於海水中，體溫流失迅速，
    上岸後需以烈酒與篝火迅速恢復體溫，關節風濕是此地常見的職業病。 # inferred: true
  sound:
    - 潮汐湧入礁池的規律嘩啦聲與氣泡破裂的細響 # inferred: true
    - 潛水採珠人浮出水面時的換氣喘息與沉重的呼吸節奏 # inferred: true
    - 珊瑚雕琢工坊中金屬鑿刀與砂輪的尖銳摩擦聲 # inferred: true
    - 夜間走私小船划槳的輕微水聲與壓低的交易私語 # inferred: true

