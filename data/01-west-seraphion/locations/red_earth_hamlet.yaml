# ── 關係即通道（connections）──
connections:
  - target: vetustapolis
    type: physical
    direction: 西偏南
    description: >
      沿東郊驛道向西約半日馬程可達維特魯斯城牆；
      這條道路亦是第726年赤土農民軍進軍之路。
  - target: flumen_geminus
    type: physical
    direction: 南側蜿蜒
    description: >
      傑米努斯河支流從聚落南緣流過，為磚窯與鍛爐提供水源，
      也為赤土鎮的農田帶來稀薄的灌溉。

# ── 內容物（contents）──
contents:
  - item: landmark
    name: 巴爾塔薩舊居遺址
    location: 鎮東北隅
    guardian: 無
    description: >
      一棟半坍塌的泥磚茅屋，據說是巴爾塔薩家族淪為流民後的居所。
      屋內尚有一座殘破的鍛鐵爐，牆上留有模糊的錘痕。
      偶有旅人前來憑弔，但鎮民對此已習以為常。
  - item: npc
    name: 老鍛工格羅斯
    location: 鎮中央鍛爐棚
    guardian: 無
    description: >
      年逾七十的鍛工，據稱其祖父曾與巴爾塔薩之父共事。
      他會用含混的鐵水俚語講述「神聖鐵水語」時代的鍛造秘法，
      但那些技藝早已無人能够重現。
  - item: resource
    name: 赤土黏土礦脈
    location: 鎮北坡地
    guardian: 鎮公會
    description: >
      富含鐵氧化物的赤褐色黏土，是赤土鎮磚窯數百年來的原料來源。
      經高溫燒製後呈現獨特的暗紅色澤，為維特魯斯下城區修繕工程所青睞。

# ── 歷史事件（events）──
events:
  - id: baltasar_father_expelled
    year: 718
    name: 巴爾塔薩之父被逐出鍛造師公會
    description: >
      教廷認證的「神聖鐵水語」鍛造師因拒絕為某位樞機主教的私生子鑄造鍍金盔甲，
      被逐出公會，全家淪為赤土鎮的貧苦流民。
  - id: red_earth_famine
    year: 725
    name: 赤土饑荒
    description: >
      連續三年霜凍摧毀傑米努斯河兩岸冬小麥，教廷救濟糧在抵達赤土鎮前被層層克扣。
      霜月，赤土鎮爆發搶糧暴動。
  - id: red_earth_peasant_uprising
    year: 726
    name: 赤土農民軍起義
    description: >
      巴爾塔薩將黑鐵營與赤土鎮饑民合併，率領約兩萬人向維特魯斯進發。
      圍城七個月後，艾森瓦爾五世自焚，王朝終結。

