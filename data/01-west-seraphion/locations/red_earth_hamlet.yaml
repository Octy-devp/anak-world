# ── 身份錨定（必填）──
id: red_earth_hamlet
name: 赤土鎮
layer: settlement
region: 維特魯斯東郊
empire: 塞拉菲昂神聖帝國
parent_id: west_seraphion

# ── 敘事錨定（必填）──
description: >
  赤土鎮坐落於維特魯斯東郊的緩坡台地上，傑米努斯河支流從南側蜿蜒而過。
  這是一個以磚窯與鍛爐為生的工匠聚落，土質因富含赤褐色鐵氧化物而得名。

  鎮上數十座圓頂磚窯與低矮的鍛造工坊日夜不息，煙霧與紅塵是此處永恆的風景。
  居民多為世代相傳的泥瓦匠、磚工與鍛造師，他們以當地方言交談，
  使用一套簡化的「鐵水俚語」來描述爐溫與黏土配比——
  這是「神聖鐵水語」在民間的退化殘留。

  第718年，教廷認證鍛造師巴爾塔薩之父因拒絕為樞機主教私生子鑄造鍍金盔甲，
  被逐出公會，全家淪為赤土鎮的貧苦流民。
  第725年霜月，連年霜凍摧毀冬小麥，教廷救濟糧層層克扣，赤土鎮爆發搶糧暴動；
  巴爾塔薩向暴民提供武器，將黑鐵營與饑民合併為「赤土農民軍」。
  第726年春日，他率領約兩萬人向維特魯斯進發，最終推翻艾森瓦爾王朝。

  到了第825年，赤土鎮已恢復為一個普通的村落。
  巴爾塔薩的傳說仍在鍛爐邊流傳，但瓦羅蘭特皇室從未給這座誕生地帶來任何實質恩惠。
  磚窯依舊冒著黑煙，鍛爐依舊敲打著廢鐵與劣質青銅，
  而當年的「神聖鐵水語」鍛造技藝早已失傳，只剩下老人口中模糊的記憶。
  這裡的人們與帝國首都僅有半日馬程，卻像活在另一個世界。

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 赤褐色黏土經日曬後的乾燥塵土味
    - 磚窯燃燒柴薪的濃煙與焦土氣息
    - 鍛爐中劣質煤炭與廢鐵加熱後的刺鼻硫味
    - 傑米努斯河支流的濕泥與藻類氣息 # inferred: true
  light: >
    白天被磚窯黑煙過濾成昏黃的琥珀色；黃昏時鍛爐餘燼將低矮茅屋的輪廓染成暗紅；
    夜間僅有幾盞油燈與爐火在煙霧中明滅。
  temperature: >
    鍛爐與磚窯周邊終年燥熱，但冬季寒風自東郊平原長驅直入，
    爐火與霜氣在狹窄巷道中交替襲人。
  sound:
    - 鍛錘敲打廢鐵的鏗鏘節奏
    - 磚窯工吆喝與牛車碾過碎磚的吱嘎聲
    - 傑米努斯河支流的涓涓水聲
    - 老人在爐邊低語巴爾塔薩傳說的絮語 # inferred: true

