  access_level: public
  danger_level: low
  religion: 普世教會西派（創世主阿薩）
  population: 120  # inferred: true
  settlement_type: monastery
  wonders:
    - healing_spring

# ── 關係即通道（connections）──
connections:
  - target: flumen_geminus
    type: physical
    direction: 河谷下方
    description: >
      傑米努斯河主流經修道院所在的河谷下方流過，
      修道院的淨化水源最終匯入大河。
      沿河岸小徑向上游可深入山區，向下游約一日半可達維特魯斯。
  - target: vetustapolis
    type: conceptual
    direction: 下游遠望
    description: >
      與維特魯斯聖秩總修院有隸屬關係，教廷每季度派遣巡察僧前來考核帳目與神學正統性。
      同時接收來自維特魯斯下城區的隕鐵中毒工匠與傳染病患。

# ── 內容物（contents）──
contents:
  - item: landmark
    name: 聖泉堂
    location: 修道院中央
    guardian: 水流動者修會院長
    description: >
      帶有穹頂的圓形石砌聖堂，中央為天然礦泉湧池。
      穹頂圓窗在特定時辰將陽光折射為淡青色水紋，
      被修女們視為艾尼亞精靈王的微弱顯現。
      泉水終年保持恆溫，礦物含量豐富，是修道院療癒傳統的核心。
  - item: landmark
    name: 病患收容所
    location: 東翼
    guardian: 資深療癒修女
    description: >
      兩層石砌長樓，下層收容傳染病與急性創傷患者，上層為慢性病與隕鐵中毒工匠的療養區。
      空氣中瀰漫著醋與薰衣草的消毒氣息，走廊牆壁上刻有歷代修女記錄的病例簡註。
  - item: landmark
    name: 草藥作坊
    location: 西翼底層
    guardian: 藥草修女
    description: >
      乾燥、研磨、熬煮與儲存藥草的綜合作坊。
      牆上掛滿風乾的植物標本，架子上排列著陶罐與玻璃研缽。
      修女們在此調製礦泉藥浴、止痛膏與退熱酊劑。
  - item: npc
    name: 院長塞拉菲娜
    location: 聖泉堂與院長居室
    guardian: 無
    description: >
      年約五旬的水流動者高階修女，擅長礦泉療法與外科清創。
      據說她的淚水能淨化被霜生污染的水源，但隨著年歲增長，這項能力已越來越難以喚起。
      她對教廷的官僚腐敗與神恩券貶值深感憂慮，卻仍堅守修道院的救濟傳統。
  - item: resource
    name: 天然療癒礦泉
    location: 聖泉堂中央湧池
    guardian: 水流動者修會
    description: >
      富含硫與多種礦物質的天然泉水，水溫恆定，對皮膚潰爛、高熱與風濕痛有舒緩之效。
      修女們相信其淨化之力源於流水精靈王艾尼亞的恩賜，
      雖然在第825年，這種信仰已更多地化為一種堅韌的習慣而非確定的魔法。

# ── 歷史事件（events）──
events:
  - id: still_waters_founded
    year: 610
    name: 流泉修道院建立 # inferred: true
    description: >
      艾森瓦爾二世時期，普世教會為鞏固對傑米努斯河上游河谷的控制，
      並利用當地天然礦泉的療癒傳聞，派遣水流動者修女在此建立修道院。
      此後數百年間，這裡逐漸成為西塞拉菲昂地區重要的救濟與醫療據點。
  - id: healing_order_degradation
    year: 800
    name: 元素聖秩退化加劇
    description: >
      隨著百年戰爭持續與魔法傳承斷裂，水流動者的治癒魔法嚴重退化。
      流泉修道院被迫從「以魔法救人」轉向「以草藥、礦泉與基礎外科維生」，
      修女人數銳減，收容壓力與日俱增。

