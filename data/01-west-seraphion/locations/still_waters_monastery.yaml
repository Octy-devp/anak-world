# ── 身份錨定（必填）──
id: still_waters_monastery
name: 流泉修道院
layer: settlement
region: 傑米努斯河上游
empire: 塞拉菲昂神聖帝國
parent_id: west_seraphion

# ── 敘事錨定（必填）──
description: >
  流泉修道院坐落於傑米努斯河上游的僻靜河谷中，距離維特魯斯約一日半馬程。
  這是一座獨立於維特魯斯聖秩總修院之外的水流動者修會分院，
  隸屬於普世教會西派教廷的「元素聖秩」體系，卻因地處偏遠而保有一定的自治傳統。

  修道院以河谷深處一座天然礦泉為核心建築軸心。
  水流動者修女們相信這眼泉水承載著流水精靈王艾尼亞的微弱恩賜，
  其礦物成分對高熱與皮膚潰爛具有舒緩之效——
  雖然遠不及黃金時代魔法的威能，但足以讓高燒的孩童安然入睡，
  讓因處理隕鐵而慢性中毒的工匠獲得片刻喘息。

  院內專收傳染病患、窮苦流民中的傷病者，以及從維特魯斯下城區轉送來的隕鐵中毒工匠。
  修女們以草藥學、礦泉療法與基礎外科技藝照顧病人，
  同時負責淨化附近村莊被霜生殘留物或戰爭屍毒污染的水源。
  在第825年，這項工作比以往任何時候都更加艱難：
  百年戰爭帶來了大批傷兵與難民，而元素聖秩的魔法已嚴重退化，
  修女們的淚水雖仍能淨化污水，但「水流動者」的數量已寥寥無幾。

  修道院的建築群環繞礦泉而建：中央是帶有穹頂的聖泉堂，
  東翼為病患收容所，西翼為修女居所與草藥作坊，
  北側高地上有一座小型烽火台，與維特魯斯東郊的警戒網絡遙相呼應。
  儘管地處僻靜，修道院並非完全與世隔絕——
  教廷每季度派來巡察僧，選帝侯的收稅官也偶爾光顧，
  而附近村莊的農民則以糧食與柴火換取修女們的醫藥救濟。

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 礦泉水特有的硫黃與金屬氣息
    - 草藥作坊中乾燥薄荷、艾草與金盞花的混合藥香
    - 病患收容所的醋與薰衣草消毒水味 # inferred: true
    - 河谷松林針葉經日曬後的樹脂清香 # inferred: true
  light: >
    清晨薄霧中，聖泉堂穹頂的圓窗將光線折射為淡青色的水紋光斑；
    午後陽光穿透河谷兩側的懸崖，在聖泉池面投下細長的金色條帶；
    夜間僅有聖泉堂長明燈與修女夜巡的燭光在迴廊中搖曳。
  temperature: >
    聖泉堂內終年涼爽濕潤，礦泉蒸騰的水汽使石砌牆壁保持微涼；
    病患收容所則靠壁爐與厚毯維持溫暖。
    冬季河谷寒風從上游峽谷灌入，修女們以松木取暖，空氣中瀰漫著煙燻與松脂的氣息。
  sound:
    - 聖泉池中泉水湧出的持續潺潺聲
    - 修女們低聲誦念療癒禱文的單調旋律
    - 草藥作坊中研缽研磨藥草的細碎聲響
    - 傑米努斯河上游在遠處峽谷中的低沉水鳴 # inferred: true
    - 病患收容所中偶爾傳來的咳嗽與呻吟 # inferred: true

# ── 屬性標籤──
