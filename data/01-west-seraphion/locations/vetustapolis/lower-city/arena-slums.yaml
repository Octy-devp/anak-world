    description: 貧民在看台拱洞內以碎石和木板隔出的簡陋居所
  - item: landmark
    name: 皇家觀覽台的破衣晾曬區
    description: 原本皇家專用的觀覽台，現掛滿洗過的破爛衣服，風中飄蕩如破爛旗幟
  - item: landmark
    name: 聖奴徵召點
    description: 金堅牢者偶爾進入帶走最健壯青年的徵召地點

