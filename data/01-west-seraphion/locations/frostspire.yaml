# ── 關係即通道（connections）──
connections:
  - target: northern_mountains
    type: physical
    direction: 北方
    hidden: false
    description: >
      約恩維德山脈橫亙極北，是抵禦極地風暴的天然屏障，
      霜尖塔要塞位於山脈南麓的凍土帶上，依山勢修築防線。
  - target: the_howling_peaks
    type: conceptual
    direction: 南方內陸
    hidden: false
    description: >
      怒嘯山脈縱貫大陸中央，是帝國東西與南北的天然分界；
      霜尖塔要塞的補給線與難民流沿山脈北緣的通道艱難維持，
      但帝國議會癱瘓後，來自南方的官方支援早已斷絕。

# ── 內容物（contents）──
contents:
  - item: landmark
    name: 冰牆堡壘（霜尖塔主樓）
    location: 要塞中央高塔
    guardian: 冰防役禁衛軍
    description: >
      要塞核心高塔以黑曜石與凍土磚砌成，外壁覆蓋冰層以增強防禦。
      塔頂設有終年不熄的烽火台，用於監視白霜冰壁防線的動向。
      塔名「霜尖」源自其尖頂終年覆霜、如利刃刺向蒼天的外形。 # inferred: true
  - item: landmark
    name: 十米深冰窖網絡
    location: 要塞與周邊堡壘地下
    guardian: 冰防役工兵隊
    description: >
      邊境村莊與要塞地下挖掘深達十米的冰窖，以躲避白霜法師的寒法攻擊。
      冰窖中儲存糧食、草藥與凍原苔蘚燃料，是北方生存的最後保障。
  - item: npc
    name: 伊薩克·西爾伯弗羅斯特（冰牆大公）
    location: 霜尖塔指揮廳
    description: >
      第825年在位的西爾伯弗羅斯特邊疆大公，被稱為「冰牆大公」。
      頒布《霜戒法》實行極端軍事化統治，與施塔爾傭兵聯盟簽訂屈辱條約，
      實際上已成為帝國北方邊境的軍閥割據者。

# ── 歷史事件（events）──
events:
  - id: frost_edicts_enacted
    year: 790
    name: 《霜戒法》頒布
    description: >
      伊薩克·西爾伯弗羅斯特頒布《霜戒法》，規定所有男子十六歲起服「冰防役」，
      女子編織防寒毛氈、熬製草藥，邊境村莊全面軍事堡壘化。
  - id: silberfrost_mercenary_treaty
    year: 789
    name: 西爾伯弗羅斯特與施塔爾傭兵聯盟簽約
    description: >
      帝國議會癱瘓後，伊薩克擅自與施塔爾傭兵聯盟簽訂屈辱條約，
      允許僱傭兵在領地內徵兵、徵糧並分享邊境貿易稅收，
      使西爾伯弗羅斯特邊疆實質淪為軍閥割據區。

