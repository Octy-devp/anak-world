# ── 身份錨定（必填）──
id: frostspire
name: 霜尖塔要塞
layer: settlement
region: 北方邊境凍土帶
empire: 塞拉菲昂神聖帝國
parent_id: west_seraphion

# ── 敘事錨定（必填）──
description: >
  霜尖塔要塞是西爾伯弗羅斯特邊疆大公國的首府，坐落於帝國最北端的凍土帶上，
  直接面對阿爾比諾克拉西亞的冰壁防線與霜生滲透。
  第825年在位的伊薩克·西爾伯弗羅斯特（Isaac Silverfrost）被稱為「冰牆大公」，
  其統治是一種極端的軍事化神權制度。

  伊薩克頒布《霜戒法》：所有男子自十六歲起需服「冰防役」，
  女子則在後方編織防寒毛氈、熬製草藥。
  邊境村莊被改造成軍事堡壘，地下挖掘深達十米的冰窖，
  以躲避白霜法師的「寒法」攻擊。
  要塞周圍的凍土帶上，無數「冰墓」靜靜矗立——
  那些被白霜法師瞬間冰封的村落與居民，成為了無聲的邊界標記，
  也是西爾伯弗羅斯特士兵巡邏時的心理陰影。

  第788年帝國議會因「西爾伯弗羅斯特動員法之爭」癱瘓後，
  伊薩克向維特魯斯求援的軍費與糧食從未到位。
  作為回應，他擅自與施塔爾傭兵聯盟簽訂了屈辱條約：
  允許僱傭兵在領地內徵兵、徵糧，並分享邊境貿易稅收。
  到了第825年，霜尖塔要塞實際上已成為一個軍閥割據區，
  伊薩克的命令僅在堡壘內有效，堡壘之外的荒野則屬於僱傭兵與霜生滲透者。

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 凍土與永凍層的無機冷冽氣息
    - 深埋冰窖中陳年積雪的壓縮空氣味
    - 防寒毛氈的羊毛脂與動物油脂氣味 # inferred: true
    - 熬製草藥的苦涩根莖氣息 # inferred: true
    - 隕鐵樁與鐵鏽在極寒中的乾燥金屬味 # inferred: true
  light: >
    極北長夜的慘白微光與冰壁反射的冷藍；
    冰窖深處僅有動物油脂燈的搖曳昏黃；
    遠方冰墓在月光下閃爍詭異的半透明光澤。 # inferred: true
  temperature: >
    終年極寒，室外溫度常在零下三十度以下；
    冰窖深處反而因地熱溝渠維持穩定低溫，堡壘內靠燃燒凍原苔蘚與動物糞便勉強維持生存溫度。 # inferred: true
  sound:
    - 極北永恆風嘯穿過隕鐵樁與瞭望塔的尖嘯
    - 地下冰窖深處冰層緩慢擠壓的呻吟 # inferred: true
    - 冰防役士兵在城牆上巡邏的鐵靴踏雪聲
    - 遠方冰墓區偶爾傳來的冰裂細響 # inferred: true
    - 傭兵營地中的低聲咒罵與骰子滾動 # inferred: true

