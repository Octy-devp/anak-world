# ── 身份錨定（必填）──
id: ashtown
name: 阿申斯塔特
layer: settlement
region: 中部平原邊緣
empire: 塞拉菲昂神聖帝國
parent_id: west_seraphion

# ── 敘事錨定（必填）──
description: >
  阿申斯塔特（Ashtown，又稱「灰燼鎮」）位於塞拉菲昂神聖帝國中部平原邊緣，
  原是格蘭迪斯大公領地內的一個大型農村市集。
  因《大憲章》中關於「商業聚落自治權」的模糊條款，於第765年升格為自由市。

  阿申斯塔特的崛起依賴於其地理位置——它是格蘭迪斯麥田與南方海岸之間的必經商道樞紐。
  格蘭迪斯大公奧托從未承認其獨立地位，長期在邊境陳兵，
  試圖以「糧食禁運」迫使阿申斯塔特屈服。
  到了第825年，這場衝突已持續七年，奧托大公以「糧道安全」為由在邊境修築軍事哨站，
  實質封鎖了這座自由市的陸路補給。

  阿申斯塔特的市民依靠與雙子門市、焰紋市的聯盟，
  通過傑米努斯河航運維持生存，
  並僱傭了施塔爾傭兵聯盟的一個支隊（「灰燼守衛」）來防禦格蘭迪斯的「麥穗軍團」。
  作為「五大特別市聯盟」成員之一，阿申斯塔特與維特魯斯聖座、雙子門市、焰紋市及鹽白城共享一個選帝侯投票權。

  這座城市以工匠行會與冷鍛技術聞名。
  工匠行會「冷鍛同盟」領袖之女索菲亞·燼心，七歲時被選入靜默之塔成為聖女候選人。
  她擁有驚人的機械直覺，常在夢中看見父親工坊裡的齒輪轉動，
  堅信神的恩典如果有形狀，應該是一個能轉動的水車，而非一句拒絕回答的咒語。

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 冷鍛隕鐵的特殊金屬氣息與淬火藥水的刺鼻味
    - 來自鄰近格蘭迪斯麥田的乾草與麥糠味
    - 軍事哨站營火的木材煙熏味 # inferred: true
    - 市集上香料、油脂與皮革的混合氣味 # inferred: true
  light: >
    冷鍛工坊的熔爐在夜間將城鎮東側染成暗紅；
    白日裡廣闊的沖積平原天光毫無阻擋地傾瀉而下，
    將灰燼市集的石板地面照得慘白。
  temperature: >
    屬大陸性氣候，夏季炎熱乾燥，冬季寒風自平原長驅直入；
    冷鍛工坊周邊終年溫熱，與戶外的嚴寒形成鮮明對比。 # inferred: true
  sound:
    - 冷鍛錘擊隕鐵的清脆節奏與金屬回響
    - 傑米努斯河航運船隻的號子與絞盤聲
    - 市集上商販與農民的討價還價聲
    - 灰燼守衛傭兵在邊境演練時的口令與步伐聲 # inferred: true
    - 格蘭迪斯邊境軍事哨站遠處傳來的號角聲 # inferred: true

