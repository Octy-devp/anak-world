# ── 關係即通道（connections）──
connections:
  - target: the_flood_plain
    type: physical
    direction: 坐落於邊緣
    description: >
      位於中央沖積平原邊緣，是格蘭迪斯麥田與南方海岸之間的必經商道樞紐，
      陸路補給線受格蘭迪斯軍事哨站威脅。
  - target: flumen_geminus
    type: physical
    direction: 東南方河流
    description: >
      通過傑米努斯河航運與雙子門市維持聯盟，獲取糧食與物資補給，
      以對抗格蘭迪斯的糧食禁運。
  - target: twin_gates
    type: conceptual
    direction: 東南方同盟
    description: >
      五大特別市聯盟成員，通過傑米努斯河航運與雙子門市維持緊密聯盟，
      依靠對方的糧食與物資補給對抗格蘭迪斯的封鎖。
  - target: flamemark
    type: conceptual
    direction: 南方同盟
    description: >
      五大特別市聯盟成員，與焰紋市結盟。
      焰紋市以冷鍛隕鐵與青銅混合技術聞名，為阿申斯塔特提供武器與工匠技術支援。
  - target: vetustapolis
    type: conceptual
    direction: 東南方同盟
    description: >
      五大特別市聯盟成員，與維特魯斯聖座共享一個選帝侯投票權，
      在選帝侯議會中由五城執政官代表城市利益。

# ── 內容物（contents）──
contents:
  - item: landmark
    name: 冷鍛同盟會館
    location: 工匠區中心
    guardian: 冷鍛同盟領袖
    description: >
      工匠行會「冷鍛同盟」的總部，繼承了部分赭石行會與黑曜石守望者的技術傳統。
      會館地窖中存放著少量隕鐵原料，由資深工匠以無需高溫的冷鍛秘法塑形。
      索菲亞·燼心之父為現任領袖。
  - item: landmark
    name: 灰燼市集
    location: 原農村市集舊址
    guardian: 市集公會
    description: >
      自格蘭迪斯領地時期延續至今的大型市集，是自由市貿易樞紐。
      糧食禁運期間，市集上小麥價格飛漲，商販以物易物，神恩券被拒絕接受。
  - item: npc
    name: 灰燼守衛
    location: 城市邊境哨站
    guardian: 施塔爾傭兵聯盟指揮官
    description: >
      受僱於阿申斯塔特的施塔爾傭兵聯盟支隊，負責防禦格蘭迪斯「麥穗軍團」的進攻。
      他們的旗幟是一柄斷劍與一枚金幣，信奉「戰爭即生意，和平即破產」。

# ── 歷史事件（events）──
events:
  - id: ashtown_chartered
    year: 765
    name: 阿申斯塔特升格為自由市
    description: >
      因《大憲章》中關於「商業聚落自治權」的模糊條款，
      阿申斯塔特從格蘭迪斯大公領地內的大型農村市集升格為自由市。
      格蘭迪斯大公奧托從未承認其獨立地位。
  - id: grandis_ashtown_conflict
    year: 818
    name: 格蘭迪斯對阿申斯塔特邊境封鎖
    description: >
      奧托大公以「糧道安全」為由在阿申斯塔特邊境修築一系列軍事哨站，
      實質封鎖陸路補給，試圖以糧食禁運迫使自由市屈服。
      至第825年，這場衝突已持續七年。

