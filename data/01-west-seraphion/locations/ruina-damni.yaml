# ── 內容物（contents）──
contents:
  - item: landmark
    name: 殘垣棚屋聚落
    location: 堤壩遺跡西緣陰影處
    description: >
      以古代堤壩殘垣斷壁為天然屏障搭建的簡陋棚屋群，
      屋頂覆蓋枯草與廢木板，無法抵禦嚴冬與暴雨。 # inferred: true
  - item: landmark
    name: 滲漏農田
    location: 地下水道出口附近
    description: >
      靠古代堤壩地下水道滲漏水勉強灌溉的狹長農田，土質貧瘠，
      產量僅夠村民半數口糧，其餘需以打零工或偷獵補充。 # inferred: true
  - item: npc
    name: 逃奴婦人瑪爾塔
    location: 棚屋聚落北端
    description: >
      三年前從金穗堡領地莊園逃出的農奴婦人，在遺跡村藏匿至今。
      她暗中為其他逃奴指引地下水道的隱蔽路徑，傳聞與堤壩哨站某位年輕哨兵有曖昧關係。 # inferred: true

