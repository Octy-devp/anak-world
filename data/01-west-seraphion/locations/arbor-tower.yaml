# ── 身份錨定（必填）──
id: arbor_tower
name: 阿爾博塔瞭望塔
layer: settlement
region: 西南邊境
empire: 塞拉菲昂神聖帝國
parent_id: west_seraphion

# ── 敘事錨定（必填）──
description: >
  阿爾博塔瞭望塔（Arbor Tower，意為「樹之塔」）是塞拉菲昂神聖帝國西南邊境最孤獨的軍事前哨，
  建於一棵巨樹殘骸的腐朽根系之上。
  這棵巨樹據信是世界樹艾爾達拉在遠古時代的一條根脈延伸，
  在大洪水時期被地殼撕裂所折斷，留下直徑超過十五公尺的殘幹基座。
  帝國邊防軍在第650年前後將這座天然高台改建為瞭望塔，
  用於監控世界樹森林邊緣的動向。

  到了第825年，阿爾博塔駐軍僅有十二人，由一名修士兼軍士長指揮。
  他們的補給每兩個月從拉迪克斯守望修道院運來一次，
  冬季時常因積雪與林間小徑泥濘而延誤。
  駐軍的生活極其單調：觀測、記錄、祈禱、等待。

  巨樹殘骸的內部已被蟻蝕與真菌掏空，形成一個天然的豎井空間。
  軍士長的指揮室就設在這個空洞底部，牆壁上仍能看見巨樹年輪的紋理。
  據說在滿月之夜，年輪紋理會發出微弱的淡金色光芒——
  但所有駐軍都被告知這是「礦物磷光」，不必驚慌。

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 巨樹殘骸內部腐朽木材與真菌的濕悶甜腐味
    - 石砌增補結構中灰漿與石灰的乾燥粉塵味  # inferred: true
    - 森林方向飄來的樹脂與腐殖土氣息
    - 駐軍營房中毛毯與人體的悶臭  # inferred: true
    - 夜間偶爾從巨樹殘骸深處飄出的淡淡花香（無法解釋，無人追查）  # inferred: true
  light: >
    白天透過巨樹殘骸頂端的裂口與箭窗射入垂直光柱，塵埃在光線中緩慢旋轉；
    夜間僅有油脂燈與少量蠟燭，但據稱滿月時年輪紋理會發出微弱的淡金色自體光。  # inferred: true
  temperature: >
    巨樹殘骸內部恆溫冬暖夏涼，但石砌增補結構在冬季會變得濕冷；
    夏季森林方向的霧氣帶來異常涼意，與世界樹結界的恆溫效應有關。  # inferred: true
  sound:
    - 風吹過巨樹殘骸頂端裂口的空洞呼嘯
    - 森林邊緣的鳥鳴與昆蟲振翅（白天）
    - 駐軍士兵在狹窄空間中低聲交談與棋盤遊戲的聲響  # inferred: true
    - 巨樹殘骸內部木材在溫度變化時的細微爆裂聲  # inferred: true
    - 夜間從森林方向傳來的不明低頻嗡鳴（從未確認來源）  # inferred: true

