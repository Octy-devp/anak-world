# ── 關係即通道（connections）──
connections:
  - target: eldara_worldtree
    type: conceptual
    direction: 西方近處
    description: >
      世界樹森林的迷霧結界位於瞭望塔西方不遠處，從塔頂可俯瞰結界邊緣的淡金色霧氣流動。
      塔的存在本身就是對森民的一種監視聲明——儘管沒有人知道森民是否在意。
  - target: radix_specula
    type: physical
    direction: 東南方
    description: >
      拉迪克斯守望修道院是阿爾博塔的補給與指揮上級，兩地之間以狹窄林間小徑相連，
      快馬約兩個時辰可達。  # inferred: true
  - target: terminus_hamlet
    type: physical
    direction: 東南方低處
    description: >
      特爾米努斯邊境村位於阿爾博塔東南方的谷地中，從塔頂可遠遠望見村莊的炊煙。  # inferred: true

# ── 內容物（contents）──
contents:
  - item: landmark
    name: 巨樹殘骸基座（Truncus Arboris）
    location: 瞭望塔主體結構
    description: >
      直徑超過十五公尺的巨樹殘幹基座，內部已被蟻蝕與真菌掏空形成天然豎井。
      石砌增補結構圍繞殘幹而建，構成瞭望塔的主體。
      牆壁上清晰可見的年輪紋理據信超過三千年，
      滿月之夜會發出微弱的淡金色光芒——駐軍稱之為「樹的記憶」，軍士長稱之為「礦物磷光」。
  - item: resource
    name: 頂層觀測台
    location: 巨樹殘骸頂端石砌結構
    guardian: 駐軍哨兵
    description: >
      以隕鐵加固的石砌觀測台，設有四面瞭望窗與一台老舊的單筒望遠鏡。
      這是帝國西南邊境最高的觀測點，天氣晴朗時可遠眺世界樹森林結界邊緣的樹冠輪廓。
      但大多數時候，濃霧與森林方向的低雲令視野不足一里。  # inferred: true
  - item: npc
    name: 修士兼軍士長加百列·樹輪（Gabriel Annulus）
    location: 巨樹殘骸空洞底部指揮室
    description: >
      四十八歲的前修道院園丁，因在一次爭執中打傷同僚而被調任至阿爾博塔已有八年。
      他是駐軍中唯一親眼見過「銀色光點在霧中移動」的人，
      但他在正式報告中將其記錄為「狐狸眼睛反光」。
      他開始相信巨樹殘骸仍有某種生命，並在私下對其低聲祈禱——不是向阿薩，而是向「樹本身」。  # inferred: true

