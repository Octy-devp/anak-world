# ── 關係即通道（connections）──
connections:
  - target: vetustapolis
    type: physical
    direction: 東方
    hidden: false
    description: >
      沿夕照畿林間獵道向東約半日馬程可達維特魯斯西城門；
      這條道路僅供皇室與受邀廷臣使用，沿途設有不起眼的界碑。 # inferred: true
  - target: red_earth_hamlet
    type: conceptual
    direction: 東南方
    hidden: false
    description: >
      赤土鎮位於維特魯斯東郊，與維納托里烏姆莊園同屬夕照畿的狹小直轄區域；
      兩地雖僅隔一座城市的距離，卻象徵著瓦羅蘭特皇室從鐵匠起義到垂暮榮光的兩極命運。 # inferred: true

# ── 內容物（contents）──
contents:
  - item: landmark
    name: 狩獵 lodge
    location: 莊園中央
    guardian: 皇室侍衛
    description: >
      一座混合羅馬式與哥德式風格的狩獵 lodge，牆上掛滿歷代皇帝與廷臣的狩獵戰利品。
      大廳中央的壁爐終年燃燒蘋果木與雪松，是皇室舉行小型宴會與接見親信的唯一場所。 # inferred: true
  - item: landmark
    name: 皇家橡樹林
    location: 莊園西側
    guardian: 皇室林務官
    description: >
      一片被精心維護的古老橡樹林，是夕照畿內僅存的原始林地之一。
      林中設有狩獵用的隐蔽看台與誘餌投放點，但小冰期使鹿與野豬的數量逐年下降。 # inferred: true
  - item: npc
    name: 莊園總管
    location: 狩獵 lodge 側廳
    guardian: 無
    description: >
      負責管理維納托里烏姆日常運作的皇室僕役總管，
      精通在極度緊縮的預算下維持莊園體面的技藝。
      他深知這座莊園的華麗外表下是教廷借債與格蘭迪斯大公「恩賜」的脆弱支撐。 # inferred: true

# ── 歷史事件（events）──
events:
