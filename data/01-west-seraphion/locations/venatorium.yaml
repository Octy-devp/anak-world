    year: 620
    name: 維納托里烏姆莊園建立
    description: >
      艾森瓦爾王朝時期，皇帝下令在維特魯斯近郊森林中闢建皇家狩獵莊園，
      作為皇室秋季傳統狩獵與接見外國使節的場所。 # inferred: true

