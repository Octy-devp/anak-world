  settlement_type: village
  wonders: []

# ── 關係即通道（connections）──
connections:
  - target: frostspire
    type: physical
    direction: 南方
    hidden: false
    description: >
      沿凍土巡邏道向南約一日行程可達霜尖塔要塞；
      這條道路亦是冰防役補給線與巡邏路線，但冬季常因暴風雪中斷。 # inferred: true
  - target: northern_mountains
    type: conceptual
    direction: 北方
    hidden: false
    description: >
      約恩維德山脈橫亙極北，伊斯格拉夫冰墓位於山脈南麓凍土帶的最前緣，
      是帝國與白霜勢力之間無聲的界碑。 # inferred: true

# ── 內容物（contents）──
contents:
  - item: landmark
    name: 冰封村落遺跡
    location: 冰墓中央
    guardian: 無
    description: >
      數十座茅屋與一座小禮拜堂被完整的冰層封存在內，
      建築輪廓清晰可辨，居民凍結的姿態維持著最後一刻的驚恐或沉睡。
      冰層表面的隕鐵樁環繞村落形成不完整的防護圈。
  - item: landmark
    name: 殘存冰窖入口
    location: 村落廣場下方
    guardian: 無
    description: >
      一座深達十米的地下冰窖部分入口尚未被冰層完全封死，
      內部殘存少量陳年積雪與凍土磚結構。
      偶有逃難者或傭兵在暴風雪中暫時躲入，但深處的寒法殘餘仍具危險性。 # inferred: true

