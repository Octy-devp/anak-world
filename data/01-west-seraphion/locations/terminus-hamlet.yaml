id: terminus_hamlet
name: 特爾米努斯邊境村
layer: settlement
region: 西南邊境
empire: 塞拉菲昂神聖帝國
parent_id: west_seraphion

# ── 敘事錨定（必填）──
description: >
  特爾米努斯（Terminus，意為「邊界」）是帝國與艾爾達拉秘境邊界上的一座農奴村，
  坐落於拉迪克斯守望修道院南方約半日步行路程的丘陵谷地中。
  這裡的村民世代是修道院的農奴，為修士們耕種田地、放牧山羊、砍伐邊界木材，
  並執行一項無形的義務：監聽森林方向的聲音，並向修道院報告任何異常。

  村民們從未見過森民。他們中的大多數人甚至不確定森民是否真實存在——
  那些銀髮尖耳的生物更像是修士們在禮拜堂中講述的古老寓言。
  但村民們確實「感受」到森林的異樣：夜間從西方傳來的不明低鳴、
  偶爾在田邊發現的奇異發光痕跡、以及那些生長速度異常快的蘑菇圈。
  老一輩村民會在森林方向的田邊立起粗糙的木刻神像，但年輕人認為那只是迷信。

  第825年，迷霧結界的緩慢擴張令村莊最西邊的兩塊田地變得無法耕作——
  任何在那裡播種的穀物都會在一夜之間枯萎，土壤呈現不自然的灰白。
  修道院長下令放棄這兩塊田地，但沒有解釋原因。
  村民們在恐懼與無知中繼續生活，離邊界越來越近。

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 農田中新翻泥土與腐熟糞肥的厚重氣息
    - 山羊圈與雞舍的牲畜腥臭  # inferred: true
    - 木柴炊煙中樺樹與橡樹的混合煙味  # inferred: true
    - 森林方向飄來的淡淡霧氣濕潤味（村民稱之為「樹的呼吸」）  # inferred: true
    - 被放棄田地中枯萎穀物散發的詭異甜腐味  # inferred: true
  light: >
    白天是開闊谷地的自然天光，但西方森林方向的陽光總顯得有些「過濾」——
    彷彿有一層看不見的薄紗擋在太陽與田地之間；
    夜間僅有農舍的微弱燈火，西方森林則是一片沒有星光的濃黑。  # inferred: true
  temperature: >
    谷地夏季溫和，冬季濕冷；
    但被放棄的田地周邊常年比村莊其他區域低兩至三度，
    村民們不願在夜間接近那裡。  # inferred: true
  sound:
    - 農耕時節的鋤頭與鐮刀節奏聲
    - 山羊鈴鐺與牧羊人的吆喝
    - 夜間貓頭鷹與狐狸的尋常叫聲
    - 森林深處偶爾傳來的不明低鳴（從未確認來源，村民稱之為「樹語」）  # inferred: true
    - 風吹過被放棄田地時發出的異常嘶嘶聲（與普通風聲不同）  # inferred: true

