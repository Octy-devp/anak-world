# ── 關係即通道（connections）──
connections:
  - target: eldara_worldtree
    type: conceptual
    direction: 西方緊鄰
    description: >
      艾爾達拉世界樹森林的迷霧結界位於村莊西方不遠處，肉眼可見淡金色的霧氣在林線後方流動。
      村民從未進入結界，也從未見過森民——他們只在夜間聽到聲音，在田邊發現痕跡。
  - target: radix_specula
    type: physical
    direction: 北方
    description: >
      拉迪克斯守望修道院是村莊的上級領主與保護者，村民每週需向修道院繳納農產品，
      並報告任何來自森林方向的異常。  # inferred: true
  - target: arbor_tower
    type: physical
    direction: 西北方向
    description: >
      阿爾博塔瞭望塔位於村莊西北方的丘陵高處，從村莊可遠遠望見塔頂的微弱燈火。  # inferred: true

# ── 內容物（contents）──
contents:
  - item: landmark
    name: 界碑木刻群
    location: 村莊最西邊的田邊
    description: >
      十餘座粗糙的木刻神像，由歷代村民釘入田邊土壤中。
      這些木刻沒有統一的形象——有的是簡化的太陽圓盤（創世主阿薩），
      有的是模糊的樹形輪廓（村民口中的「樹爺爺」）。
      修道院長多次下令拆除這些「異教偶像」，但村民總會在夜間重新豎立。  # inferred: true
  - item: npc
    name: 老農埃爾溫·邊界（Erwin Terminus）
    location: 村莊西端農舍
    description: >
      村中最年長的農奴，據稱年輕時曾在森林邊緣見過「銀色的光點在霧中移動」。
      他從不確定那是森民、狐狸的眼睛反光、還是自己的幻覺。
      他是唯一敢於夜間獨自在被放棄田地附近行走的人，
      聲稱「樹的呼吸不會傷害尊重它的人」。  # inferred: true
  - item: resource
    name: 被放棄的灰白田地
    location: 村莊最西端兩塊田地
    description: >
      約兩公頃的農田，自第815年迷霧擴張後變得無法耕作。
      土壤呈現不自然的灰白色，任何播種的穀物都會在一夜之間枯萎。
      修道院長下令放棄這兩塊田地，但從未解釋原因。
      偶爾有年輕人打賭進入灰白田地中央，出來後都聲稱「聽到了樹根在地下移動的聲音」。  # inferred: true

