    description: >
      以隕鐵與黑曜石加固的軍事瞭望塔，塔頂設有終年不熄的烽火台。
      塔內安裝有粗糙的寒法探測儀，以隕鐵共振頻率感應極寒魔力波動。 # inferred: true
