# ── 關係即通道（connections）──
connections:
  - target: frostspire
    type: physical
    direction: 南方
    hidden: false
    description: >
      沿凍土巡邏道向南約兩日行程可達霜尖塔要塞；
      瓦克托恩的烽火警報是霜尖塔判斷白霜大規模攻勢的最早信號。 # inferred: true
  - target: northern_mountains
    type: physical
    direction: 北方
    hidden: false
    description: >
      約恩維德山脈橫亙哨站正北方，山脈隘口是白霜滲透與霜生襲擊的主要通道；
      瓦克托恩的瞭望塔終日監視山脈雪線上的任何異動。 # inferred: true
  - target: isgrav
    type: conceptual
    direction: 東方
    hidden: false
    description: >
      伊斯格拉夫冰墓位於瓦克托恩哨站東方的凍土帶上，
      是哨站巡邏範圍的東界，也是寒法師活動最頻繁的區域之一。 # inferred: true

