empire: 塞拉菲昂神聖帝國
parent_id: west_seraphion

# ── 敘事錨定（必填）──
description: >
  瓦克托恩哨站是西爾伯弗羅斯特邊境最前線的軍事哨站，
  坐落於約恩維德山脈南麓的凍土高地上，是監控白霜動向與寒法師活動的第一道肉眼防線。

  隨著第805年小冰期回返與百年戰爭的低強度衝突持續，白霜的滲透與霜生襲擊成為北方邊境的日常威脅。
  瓦克托恩哨站由霜尖塔要塞直接管轄，駐紮著專門獵殺與監視寒法師的精銳小隊。
  哨站的核心是一座以隕鐵與黑曜石加固的瞭望塔，塔頂設有終年不熄的烽火台與寒法探測儀——
  一種以隕鐵共振頻率感應極寒魔力波動的粗糙裝置。 # inferred: true

  到了第825年，瓦克托恩哨站的駐軍已縮減至不足百人，
  補給線因帝國議會癱瘓而時常中斷，施塔爾傭兵聯盟的偵察兵偶爾會分享情報以換取避風的營地。
  哨站周圍的凍土帶上散落著數座小型冰墓，提醒著駐軍他們所面對的敵人擁有瞬間毀滅一座村落的力量。

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 凍土與永凍層的無機冷冽氣息
    - 隕鐵樁與黑曜石在極寒中的乾燥金屬味 # inferred: true
    - 動物油脂燈燃燒時的腥膻煙氣 # inferred: true
    - 寒法師獵人隨身藥囊中驅寒草藥的辛辣氣味 # inferred: true
  light: >
    極北長夜的慘白微光與冰壁反射的冷藍佔據天空；
    瞭望塔頂的烽火台在警戒狀態下投射出刺目的橘紅光柱；
    寒法探測儀的隕鐵核心在感應到魔力波動時發出微弱的藍白色磷光。 # inferred: true
  temperature: >
    終年極寒，室外溫度常在零下四十度以下；
    瞭望塔內部靠燃燒凍原苔蘚與動物糞便勉強維持可生存溫度，
    但塔頂觀測台幾乎無法長時間停留。 # inferred: true
  sound:
    - 極北永恆風嘯穿過瞭望塔結構的尖嘯
    - 隕鐵探測儀間歇發出的低沉共振嗡鳴 # inferred: true
    - 寒法師獵人巡邏隊的鐵靴踏雪聲與壓低聲響的號令 # inferred: true
    - 遠方冰墓區傳來的斷續冰裂細響 # inferred: true
    - 烽火台木柴爆裂的噼啪聲 # inferred: true

