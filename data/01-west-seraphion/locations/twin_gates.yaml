# ── 關係即通道（connections）──
connections:
  - target: flumen_geminus
    type: physical
    direction: 坐落於交匯處
    description: >
      雙子門市位於傑米努斯河（Twin Rivers）交匯處，
      河流是城市的命脈與財富之源，七座青銅大橋橫跨其上，
      船運與過橋稅構成城市核心收入。
  - target: vetustapolis
    type: conceptual
    direction: 東方順流
    description: >
      沿傑米努斯河順流而下可達帝國首都維特魯斯，
      雙子門市商人公會與教廷、選帝侯之間存在複雜的利益交換與走私網絡。
  - target: the_flood_plain
    type: physical
    direction: 北岸平原
    description: >
      傑米努斯河交匯後向北形成沖積平原，
      雙子門市是平原農產品向東西貿易的轉運樞紐之一。

# ── 內容物（contents）──
contents:
  - item: landmark
    name: 橋樑廣場
    location: 城市中心，七座青銅大橋交匯處
    guardian: 雙子門市商人公會
    description: >
      帝國內陸最大的以物易物交易中心，
      攤位沿橋樑與河岸密佈，貨物從北方毛皮到南方香料應有盡有。
      這裡是橋樑語最活躍的場所，一份合同的每一個詞都可能藏有三重含義。
  - item: landmark
    name: 七座青銅大橋
    location: 橫跨傑米努斯河交匯處
    guardian: 商人公會僱傭的橋樑守衛
    description: >
      帝國境內最宏偉的河橋群，以青銅與大理石築成，
      每座橋設有收稅閘口，過橋稅是雙子門市最主要的財政來源。
  - item: npc
    name: 雙子門市商人公會
    location: 橋樑廣場周邊的公會廳
    description: >
      帝國內陸最強大的商業行會，壟斷了傑米努斯河中游的水路貿易與過橋稅。
      公會成員精通橋樑語，以合同欺詐與關稅操縱聞名，
      同時也經營著通往維特魯斯與西爾伯弗羅斯特的地下走私網絡。
  - item: document
    name: 橋樑語詞典（地下抄本）
    location: 商人公會密室與黑市流傳
    description: >
      一種夾雜神聖鐵水語與古代商業術語的暗語手冊，
      專門用於合同欺詐與關稅規避，
      每個季度都會更新詞彙以應對教廷與帝國法庭的審查。

# ── 歷史事件（events）──
events:
  - id: pentapolis_formed
    year: 788  # inferred: true（source: 隨著第788年帝國議會的癱瘓，維特魯斯周邊四座自由市與維特魯斯聖座結成五大特別市聯盟）
    name: 五大特別市聯盟成立
    description: >
      第788年帝國議會癱瘓後，雙子門市與維特魯斯聖座、焰紋市、鹽白城、阿申斯塔特
      結成「五大特別市聯盟」（The Pentapolis），共享一個選帝侯投票權，
      以抗衡格蘭迪斯與莫爾根等大地主的吞併。
  - id: seraphina_smuggling_network
    year: 823
    name: 聖女地下糧倉網絡
    description: >
      聖女塞拉菲娜五世利用雙子門市商人公會的走私渠道，
      將格蘭迪斯大公領地內的過剩小麥秘密運入維特魯斯貧民窟，
      以繞過教廷《救濟規範化令》造成的救濟糧發放拖延。

