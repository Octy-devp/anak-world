# ── 身份錨定（必填）──
id: twin_gates
name: 雙子門市
layer: settlement
region: 傑米努斯河交匯處
empire: 塞拉菲昂神聖帝國
parent_id: west_seraphion

# ── 敘事錨定（必填）──
description: >
  雙子門市（Twin Gates）位於傑米努斯河（Twin Rivers）交匯處，
  控制著帝國境內七座青銅大橋的過橋稅。

  這座城市的建築以青銅與大理石為基調，商人公會極其強大，
  其市場「橋樑廣場」是帝國內陸最大的以物易物交易中心。
  雙子門市的市民以務實與狡詐聞名，他們發明了一種「橋樑語」——
  一種夾雜著神聖鐵水語與古代商業術語的暗語，專門用於合同欺詐。

  在主設定文獻中，雙子門市是「五大特別市聯盟」（The Pentapolis）成員之一，
  五城共享一個選帝侯投票權。
  阿申斯塔特依靠與雙子門市的聯盟，通過傑米努斯河航運維持生存。
  莫爾根王國的私掠艦隊與雙子門市之間海上衝突激烈，
  雙子門市的商人公會提高了莫爾根艦隊通過傑米努斯河入海口的「聖輪維護稅」，
  並暗中向西爾伯弗羅斯特邊疆提供情報，協助其避開莫爾根的私掠。
  聖女塞拉菲娜五世亦曾利用雙子門市商人公會的走私渠道，
  將格蘭迪斯大公領地內的過剩小麥秘密運入維特魯斯貧民窟。

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 青銅與大理石的冷冽金屬氣息
    - 傑米努斯河交匯處的濕潤泥土與蘆葦腥甜
    - 橋樑廣場上皮革、香料與魚鮮的混雜市肆氣味
    - 契約羊皮紙與油墨的陳腐酸氣 # inferred: true
  light: >
    正午時分七座青銅橋樑將日光反射為暖金色波光，
    大理石建築立面呈現慘白與金黃的交錯；
    黃昏時河面倒映橋欄的銅綠光暈；
    夜間商人公會的燈籠與橋頭火把在霧氣中暈開橙紅光圈。
  temperature: >
    河風終年帶來涼爽，夏季午後大理石廣場蓄熱悶熱，
    冬季橋面青銅欄杆冰寒徹骨。
  sound:
    - 船夫號子與傑米努斯河交匯處的流水低語
    - 橋樑廣場上商人討價還價與橋樑語的暗語低聲
    - 錢幣與契約印章在櫃檯上的清脆碰撞 # inferred: true
    - 七座大橋上車馬與行人的隆隆回響 # inferred: true

