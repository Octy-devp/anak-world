# ── 身份錨定（必填）──
id: silva_navalis
name: 西爾瓦納瓦利斯伐木谷
layer: settlement
region: 莫爾根王國境內
empire: 塞拉菲昂神聖帝國
parent_id: west_seraphion

# ── 敘事錨定（必填）──
description: >
  西爾瓦納瓦利斯伐木谷位於莫爾根王國內陸一處縱深的森林谷地，
  是王國艦隊與私掠船隻所需造船木材的主要來源地。
  谷中生長著耐水腐蝕的鐵橡木與質地輕韌的雲杉，
  經傑米努斯河支流漂運至南方海岸的船塢。

  伐木工人多為內陸貧農與契約奴工，在嚴苛的冬季伐木季中
  以斧鋸與人力將巨木放倒、去枝，順著人工滑道推入河道。
  莫爾根王國的「聖焰私掠艦隊」對木材品質要求極高，
  次等木料則低價賣給漁民修補船隻或建造棚屋。
  谷地深處傳說有古老的森林守護靈，伐木者會在開斧前以烈酒祭奠樹根。 # inferred: true

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 新伐鐵橡木的辛辣樹脂與苦澀單寧味
    - 雲杉針葉被踩踏後散發的清新松香 # inferred: true
    - 冬季枯枝落葉腐熟後的潮濕霉味 # inferred: true
    - 伐木工營地篝火中燃燒松脂的濃烈煙燻味 # inferred: true
  light: >
    谷地深處終年被濃密林冠遮蔽，僅有正午時分幾縷陽光如金色長矛刺入林間；
    清晨與黃昏，霧氣在伐木滑道與河道上瀰漫，能見度不足十步；
    夜間營地篝火是唯一光源，在巨木殘樁間投下搖曳的鬼魅陰影。 # inferred: true
  temperature: >
    林冠遮蔽使夏季涼爽宜人，但冬季谷地成為寒氣的陷阱，
    積雪深及膝蓋，伐木工需在零下氣溫中持續勞作以維持體溫；
    篝火與烈酒是抵禦嚴寒僅有的手段，凍傷與失溫每年奪走數條人命。 # inferred: true
  sound:
    - 巨木放倒時的沉悶斷裂聲與地面震動的轟響
    - 斧鋸交替的規律節奏與工人低沉的號子 # inferred: true
    - 傑米努斯河支流漂運木材時的撞擊與水流嘩啦聲 # inferred: true
    - 夜間林間貓頭鷹的淒厲啼叫與遠處狼嚎 # inferred: true

