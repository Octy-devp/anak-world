  population: 700  # 伐木工、漂運工與家眷約六百至八百人；inferred: true
  settlement_type: village
  wonders: []

# ── 關係即通道（connections）──
connections:
  - target: palace_of_tidal_song
    type: physical
    direction: 南方下游
    description: >
      經傑米努斯河支流漂運木材南下，最終抵達潮音宮周邊的船塢與修繕所，
      為莫爾根王國的私掠艦隊提供造船與維修所需的優質木料。 # inferred: true
  - target: flumen_geminus
    type: physical
    direction: 谷地東側
    description: >
      伐木谷東側緊鄰傑米努斯河支流上游，
      人工滑道與漂木水道將砍伐的巨木直接送入河道運輸系統。 # inferred: true
  - target: pearl_bay_village
    type: conceptual
    direction: 南方海岸
    description: >
      部分次等木料經河運轉海運，低價售予珍珠灣漁民修補漁船與建造棚屋，
      漁村與伐木谷之間形成物資互補的隱秘聯繫。 # inferred: true

# ── 內容物（contents）──
contents:
  - item: resource
    name: 鐵橡木與雲杉林
    location: 谷地兩側山坡
    description: >
      耐水腐蝕的鐵橡木與質地輕韌的雲杉混生林，
      是莫爾根王國艦隊造船的核心戰略資源，由私掠艦隊後勤部直接管控採伐配額。 # inferred: true
  - item: landmark
    name: 人工滑道與漂木水道
    location: 谷地中央至河道
    description: >
      以原木與夯土搭建的陡峭滑道，伐木工人將去枝巨木推入滑道，
      順勢滾入傑米努斯河支流的漂木水道，經數日漂運抵達南方海岸。 # inferred: true
  - item: landmark
    name: 伐木工冬季營地
    location: 谷地避風處
    description: >
      簡陋的半地下木屋群，冬季伐木季時容納數百名工人。
      營地中央設有長明火塘與蒸餾烈酒槽，是工人們夜間取暖與消愁的唯一去處。 # inferred: true

