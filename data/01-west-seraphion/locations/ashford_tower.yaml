# ── 關係即通道（connections）──
connections:
  - target: the_howling_peaks
    type: physical
    direction: 北方
    description: >
      阿什福德塔堡緊鄰怒嘯山脈北端餘脈，山脈是與北方白霜的天然屏障，
      也是凍土寒風與難民逃亡路線的來源方向。
  - target: the_flood_plain
    type: conceptual
    direction: 南方腹地
    description: >
      中央沖積平原是帝國的糧食命脈，但阿什福德塔堡幾乎無法從南方獲得穩定糧食供應。
      選帝侯議會對北方邊境的救濟議案常年擱置，伯爵只能依靠護憲議會的微薄援助與本地獵捕維生。  # inferred: true
  - target: vetustapolis
    type: conceptual
    direction: 南方遠處
    description: >
      維特魯斯的教廷與皇帝對北方邊境的災難採取忽視態度，
      阿什福德塔堡的求救文書如同石沉大海，伯爵只能以《大憲章》的古典庇護條款獨自承擔人道重負。  # inferred: true
  - target: flumen_geminus
    type: physical
    direction: 西方遠處
    description: >
      傑米努斯大河的北岸支流從山脈西側流淌而過，是堡壘獲取淡水與河魚的遙遠命脈，
      但水道漫長且冬季結冰，運輸極為困難。  # inferred: true

# ── 內容物（contents）──
contents:
  - item: landmark
    name: 療傷主塔
    location: 堡壘中央
    description: >
      伯爵將主塔底層改建為臨時醫院，收容從北方邊境撤下的凍傷士兵與傷員。
      塔內瀰漫著艾草與草藥的刺鼻氣息，修士與民間醫者在此不分晝夜地照料傷患。  # inferred: true
  - item: landmark
    name: 難民棚屋區
    location: 堡壘外圍護城河溝壑之間
    description: >
      臨時搭建的木板、獸皮與蘆葦棚屋，收容著從冰壁防線潰退的難民與逃兵。
      棚屋區逐年擴大，已超過堡壘本體的數倍，衛兵需每日巡邏以維持秩序。  # inferred: true
  - item: npc
    name: 阿什福德伯爵
    location: 療傷主塔頂層
    description: >
      護憲封建議會中以人道主義著稱的伯爵，以《大憲章》古典庇護條款為盾，
      拒絕將難民強行徵編為聖役軍團。他的財政因收容難民而瀕臨破產，卻在議會中贏得了小領主們的敬重。  # inferred: true
  - item: resource
    name: 山麓獵場
    location: 堡壘東方山麓
    description: >
      怒嘯山脈南麓的稀疏林地與草甸，是堡壘獲取野味與皮毛的主要來源。
      冬季獵物稀少，難民與衛兵常因爭奪獵物而發生衝突。  # inferred: true

# ── 歷史事件（events）──
events:
  - id: ashford_refugee_crisis
    year: 824
    name: 阿什福德難民潮
    description: >
      白霜的冰壁防線在冬季發動大規模滲透，西爾伯弗羅斯特邊疆數個村莊被毀，
      數百名難民湧入阿什福德塔堡。伯爵開放糧倉與教堂收容難民，以《大憲章》庇護條款拒絕教廷徵兵要求。
      這一事件使堡壘人口從三百激增至八百，也讓護憲議會在選帝侯會議中首次提出「北方邊境救濟議案」。  # inferred: true

