# ── 身份錨定（必填）──
id: ashford_tower
name: 阿什福德塔堡
layer: settlement
region: 西爾伯弗羅斯特南麓
empire: 塞拉菲昂神聖帝國
parent_id: west_seraphion

# ── 敘事錨定（必填）──
description: >
  阿什福德塔堡是護憲封建議會中一位伯爵的封地，坐落於西爾伯弗羅斯特邊疆大公國與帝國內陸之間的緩衝地帶，
  靠近怒嘯山脈的北端餘脈。這座堡壘以灰色花崗岩砌成，主塔高聳而狹窄，如同一柄插入大地的斷劍。
  四周環繞著乾涸的護城河溝壑與削尖的木樁柵欄，見證了邊境長年不斷的戰火與逃亡。

  作為帝國北方邊境與內陸之間的緩衝帶，阿什福德塔堡長期承擔著收容從北方邊境撤下的傷兵與難民的重任。
  西爾伯弗羅斯特邊疆大公國與阿爾比諾克拉西亞的百年戰爭中，無數被霜生的寒法凍傷的士兵、
  失去家園的農民、以及從冰壁防線潰退下來的殘部，沿著山脈南麓的古道湧向這座堡壘。
  伯爵開放城堡的馬廄、糧倉與教堂供難民棲身，以《大憲章》中的「古典庇護條款」為依據，
  拒絕西爾伯弗羅斯特邊疆大公與教廷將難民強行徵編為「聖役軍團」的要求。

  這種人道主義姿態使阿什福德塔堡在護憲議會中享有崇高聲譽，卻也讓伯爵的財政瀕臨破產。
  堡壘周邊的臨時棚屋區逐年擴大，農田被難民營地侵佔，衛兵人數不足百人，
  卻需維持近八百人的日常秩序。伯爵常自嘲：「我擁有一座塔堡，卻更像一座救濟院的院長。」

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 療傷草藥與艾草燻蒸的刺鼻氣息
    - 難民棚屋中擁擊人體的汗酸與柴火煙味
    - 馬廄中戰馬與傷兵繃帶的混合氣味  # inferred: true
    - 北方山脈飄來的凍土冷冽與松脂味  # inferred: true
  light: >
    主塔高窗在清晨透入狹窄的冷白光柱，照亮塔內簡陋的療傷所；
    黃昏時分，北方山脈的陰影提前籠罩堡壘，篝火與火把在棚屋區星羅棋布；
    夜間，瞭望塔上的烽火成為方圓數十里唯一的光源。  # inferred: true
  temperature: >
    山麓地帶氣溫較平原低三至五度，冬季寒風從怒嘯山脈北端長驅直下，
    棚屋區的難民常在黎明時分凍僵；夏季短暫涼爽，是難民傷口癒合的最佳時節。  # inferred: true
  sound:
    - 傷兵在療傷所中的呻吟與囈語
    - 難民兒童在棚屋區的哭喊與嬉鬧聲
    - 瞭望塔上衛兵換崗的銅號與腳步聲  # inferred: true
    - 北方遠處傳來的狼嚎與風嘯  # inferred: true
    - 馬廄中戰馬的嘶鳴與蹄鐵碰撞  # inferred: true

