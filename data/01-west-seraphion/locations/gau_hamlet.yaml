# ── 身份錨定（必填）──
id: gau_hamlet
name: 夕照畿農奴村
layer: settlement
region: 中央平原
empire: 塞拉菲昂神聖帝國
parent_id: west_seraphion

# ── 敘事錨定（必填）──
description: >
  夕照畿農奴村是維特魯斯城牆外五十里的典型農奴聚落，
  坐落於瓦羅蘭特皇室直轄領地「夕照畿」（Gau of the Dusk）的腹地。

  廣袤的凍土麥田由農奴在刺骨寒風中勞作，
  大部分收成的六成在田裡就被格蘭迪斯大公與教廷的收稅官瓜分殆盡。
  這裡維持著維特魯斯「百萬人口寄生迷宮」的最後一口氣——
  然而能運入維特魯斯的糧食，永遠不夠餵飽所有張開的嘴。

  村莊邊緣沿著城牆根部蔓延著逃荒農奴搭建的草棚帶，
  他們連進入維特魯斯下城區的資格都沒有，
  只能在冬夜的寒風中等待救濟院偶爾施捨的熱湯。
  名義上這片土地屬於夕照帝，實質上卻是格蘭迪斯大公與教廷的糧食榨取機。

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 凍土麥田枯黃麥稈與乾燥泥土的沉悶氣息
    - 農奴草棚中潮濕稻草與人畜共居的酸腐味
    - 教廷收稅官營帳中羊皮紙與墨水的官僚氣息 # inferred: true
    - 格蘭迪斯糧倉分窖中陳年麥粒與霉變的混合氣味 # inferred: true
  light: >
    日間蒼白天光橫掃無垠麥田，在凍土上投下農奴彎腰勞作的漫長影子；
    黃昏時夕陽將麥稈染成黯淡的金紅，隨即迅速被北方寒風吹熄；
    夜間草棚帶僅有零星營火與盜獵者的微弱火光，
    大部分區域沉入一片漆黑。
  temperature: >
    冬季漫長而嚴酷，小冰期使凍土越來越難以翻耕；
    春季短暫而泥濘，夏季稍暖但寒風依舊刺骨；
    草棚無法抵禦嚴冬，農奴們靠擠在牲畜棚中或相互依偎勉強存活。
  sound:
    - 刺骨寒風橫掃麥田的持續呼嘯
    - 農奴揮動鋤頭翻動凍土的沉悶撞擊聲
    - 草棚帶中嬰孩的啼哭與老人的乾咳
    - 收稅官馬車碾過泥路的吱嘎聲與鞭子破空聲
    - 遠處維特魯斯城牆上巡邏兵模糊的號角聲 # inferred: true

# ── 屬性標籤──
properties:
  controlled_by: 格蘭迪斯大公與教廷收稅官（實質控制） # 名義上屬瓦羅蘭特皇室夕照畿
  access_level: public
  danger_level: medium
  religion: 普世教會西派（創世主阿薩）
  population: 1000
  settlement_type: village
  wonders: []

# ── 關係即通道（connections）──
connections:
  - target: vetustapolis
    type: physical
    direction: 南方五十里
    description: >
      沿夕照畿驛道向南約五十里可達維特魯斯城牆北門。
      農奴終生不得進入內城，少數人有資格將糧食運至下城區指定市集交售。
  - target: the_flood_plain
    type: physical
    direction: 坐落於上
    description: >
      村莊坐落於中央沖積平原的遼闊凍土麥田之中，
      土壤肥沃但因小冰期影響，產量逐年下降。
  - target: flumen_geminus
    type: physical
    direction: 西側灌溉支流
    description: >
      傑米努斯河的一條細小支流從村莊西緣流過，
      是麥田灌溉與人畜飲水的唯一水源。
      冬季常結冰，農奴需破冰取水。

# ── 內容物（contents）──
contents:
  - item: resource
    name: 凍土麥田
    location: 村莊周邊廣袤平原
    guardian: 格蘭迪斯大公派遣的田產管事
    description: >
      綿延數里的冬小麥與黑麥田，種植於小冰期逐漸硬化的凍土之上。
      收成的大半在田間就被格蘭迪斯大公與教廷的收稅官以「靈糧稅」與「什一稅」的名義取走，
      殘餘僅夠農奴維持半飢餓狀態。
  - item: landmark
    name: 農奴草棚帶
    location: 村莊北緣，緊鄰維特魯斯城牆外區
    guardian: 無
    description: >
      由逃荒農奴以稻草、枯木與破布搭建的臨時聚居帶。
      棚屋矮小擁擠，冬季常有人凍死於其中。
      居民甚至沒有資格進入維特魯斯下城區，
      只能依靠救濟院偶爾施捨的熱湯與發霉麵包維生。
  - item: landmark
    name: 教廷收稅官駐所
    location: 村莊中央石屋
    guardian: 教廷稅吏與兩名武裝隨從
    description: >
      村中為數不多的石砌建築，門前豎立著阿薩之眼的標記。
      收稅官每年春秋兩季在此核算「什一稅」，
      任何隱瞞收成的農奴將被處以鞭刑或沒收來年種子。
  - item: landmark
    name: 格蘭迪斯糧倉分窖
    location: 村莊東側高坡
    guardian: 格蘭迪斯大公私兵
    description: >
      半埋於地下的圓形石窖，用於儲存從夕照畿各農村徵收的靈糧。
      窖內溫度恆定，可儲存麥粒達數年。
      據說金穗堡的總糧倉足以供應維特魯斯三年，這裡只是其中一座分窖。
  - item: resource
    name: 冬季結冰水井
    location: 村莊中央廣場
    guardian: 無
    description: >
      一口深達十餘米的石砌水井，是全村人畜飲水的命脈。
      冬季井口常結厚冰，農奴須以鐵鍬與熱水破冰方可取水。
      每逢嚴冬，常有體弱者因取水而跌傷或凍斃。

# ── 歷史事件（events）──
events:
  - id: gau_famine_820
    year: 820
    name: 夕照畿大饑荒 # inferred: true
    description: >
      連續三年嚴冬摧毀夕照畿麥田收成，格蘭迪斯大公拒絕減免稅賦，
      教廷救濟糧被層層克扣。
      數百名農奴餓死於草棚帶中，倖存者中有不少逃往維特魯斯下城區淪為聖奴。

