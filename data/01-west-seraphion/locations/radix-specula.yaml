# ── 身份錨定（必填）──
id: radix_specula
name: 拉迪克斯守望修道院
layer: settlement
region: 西南邊境
empire: 塞拉菲昂神聖帝國
parent_id: west_seraphion

# ── 敘事錨定（必填）──
description: >
  拉迪克斯守望修道院（Radix Specula，意為「根之瞭望」）是席爾瓦因邊境領的首都，
  坐落於塞拉菲昂神聖帝國西南邊境的一片古老橡樹林邊緣，與艾爾達拉世界樹森林的迷霧結界遙遙相對。
  這座修道院由教廷直接任命的邊境修道院長管理，非選帝侯領地，
  其核心使命只有一個：監控森民（席爾凡）的動向，並確保世界樹森林的結界不會向帝國領地擴張。

  修道院的建築風格融合了塞拉菲昂的石砌修道院傳統與邊境實用主義：
  外牆以灰色花崗岩築成，內部庭院種植著教廷認可的藥草與蔬菜；
  最高建築是一座十二邊形的瞭望塔「根之眼」，塔頂設有晝夜輪值的修士哨兵。
  修士們同時是神職人員與邊境哨兵，他們的祈禱書中夾雜著植物學筆記與森林觀測日誌。

  第825年，席爾瓦因邊境領面臨前所未有的緊張：
  世界樹森林的迷霧結界在過去十年間已緩慢擴張了數百公尺，
  侵蝕了帝國邊境的幾塊農田與獵場。
  修道院長向維特魯斯與教廷多次發出警告，但帝國議會的癱瘓令回應始終停留在紙面上。
  修士們在祈禱與恐懼中等待——他們不知道森民是否正在結界深處注視著他們。

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 修道院藥草園中薰衣草與鼠尾草的乾燥芳香
    - 古老橡樹林飄來的腐殖土與樹皮氣息
    - 石砌禮拜堂中陳年薰香與蜂蠟蠟燭的沉穩甜膩
    - 邊境方向飄來的淡淡霧氣濕潤味（無味卻令人不安）  # inferred: true
    - 修士們亞麻長袍上的皂角與陽光曝曬氣息  # inferred: true
  light: >
    修道院內部以彩色玻璃與蠟燭為主，光線昏黃而莊嚴；
    「根之眼」瞭望塔頂則日夜需要保持對森林方向的觀測，
    夜間修士們使用微弱的油燈，避免火光引起森林深處的注意。  # inferred: true
  temperature: >
    石砌建築冬暖夏涼，但西南邊境的冬季濕冷刺骨；
    夏季森林方向的霧氣會帶來異常的涼意，
    與世界樹結界附近的恆溫效應有關。  # inferred: true
  sound:
    - 修道院禮拜堂的定時鐘聲與低聲誦經
    - 瞭望塔上風向標的吱嘎轉動
    - 古老橡樹林邊緣的貓頭鷹叫聲與夜行動物窸窣
    - 修士哨兵在塔頂記錄觀測時的羽毛筆刮紙聲  # inferred: true
    - 森林深處偶爾傳來的不明低鳴（從未確認來源）  # inferred: true

# ── 屬性標籤──
properties:
  controlled_by: 普世教會西派教廷（邊境修道院長）  # inferred: true
  access_level: restricted
  danger_level: medium
  religion: 普世教會西派（創世主阿薩）
  population: 260  # 修士、見習修士與少量服役農奴；inferred: true
  settlement_type: monastery
