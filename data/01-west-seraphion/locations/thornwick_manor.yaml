name: 荊棘維克莊園
layer: settlement
region: 維特魯斯東郊
empire: 塞拉菲昂神聖帝國
parent_id: west_seraphion

# ── 敘事錨定（必填）──
description: >
  荊棘維克莊園是護憲封建議會中一位騎士領主的封地，位於維特魯斯東郊的沖積平原邊緣。
  與雄偉的城堡不同，這裡只有一座石砌主屋、一圈荊棘籬笆、以及散落其間的三十餘戶農舍。
  莊園的名字來自籬笆上瘋長的野黑莓與薔薇，它們在春夏之交開出大片暗紅花朵，遠遠望去如同血跡斑斑的圍牆。

  這位騎士擁有《大憲章》中明確記載的特權：拒絕大領主軍隊無償通過其領地。
  在選帝侯私軍頻繁往來於維特魯斯與東方邊境的時代，這項特權成為了他最穩定的財源。
  每當格蘭迪斯的麥穗軍團、莫爾根的邊境巡邏隊或教廷的聖秩騎士團經過莊園前的古道時，
  騎士便會親自率領手下的十餘名扈從攔住去路，出示《大憲章》抄本，彬彬有禮地要求繳納「道路維護稅」。

  這種做法令大領主們極為惱火，卻又無法在法理上反駁。
  護憲伯爵艾德里安·馮·小赫斯曾在選帝侯議會中公開讚揚這位騎士「以古典憲法的文字守護了小貴族最後的尊嚴」。
  然而，莊園周邊的農民對此並不熱衷——他們知道，每一次攔路索稅之後，過境的軍隊總會在離開時「順手」取走幾隻雞或一袋麥子。

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 野黑莓與薔薇花朵的甜膩香氣  # 春夏之交瀰漫
    - 石砌主屋壁爐中燃燒的蘋果木煙味
    - 農舍豬圈與雞糞的混合氣息  # inferred: true
    - 過境軍隊馬匹與鐵鏽的暫留氣味  # inferred: true
  light: >
    清晨時分，平原上的霧氣使莊園籠罩在一片乳白之中，僅荊棘籬笆頂端的暗紅花朵隱約可見；
    正午天光開闊，石屋的白牆反射出刺眼的白茫；
    黃昏時分，夕照將荊棘籬笆染成金紅，如同一圈燃燒的矮牆。  # inferred: true
  temperature: >
    屬沖積平原的溫帶氣候，夏季悶熱潮濕，冬季濕冷刺骨，
    小冰期令霜凍提前到來，農作物生長期逐年縮短。  # inferred: true
  sound:
    - 風吹過平原蘆葦的窸窣聲
    - 農婦在籬笆邊採摘黑莓時的閒談與笑語
    - 過境軍隊的馬蹄與車輪碾壓古道聲  # inferred: true
    - 騎士扈從攔路索稅時的號令與爭執聲  # inferred: true
    - 遠處維特魯斯教廷鐘聲的微弱迴盪  # inferred: true

