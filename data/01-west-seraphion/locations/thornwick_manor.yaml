# ── 關係即通道（connections）──
connections:
  - target: the_flood_plain
    type: physical
    direction: 坐落於邊緣
    description: >
      莊園位於中央沖積平原東緣，土壤屬於傑米努斯河南岸富含有機質的黑黏土，
      地勢低窪，夏季多沼澤與池塘，適合黑莓與濕地作物生長。
  - target: vetustapolis
    type: physical
    direction: 西方
    description: >
      維特魯斯聖光之城位於莊園西方約半日馬程處，是帝國的政治與宗教中心。
      莊園前的古道是通往維特魯斯東郊的主要幹道之一，過境軍隊絡繹不絕。
  - target: flumen_geminus
    type: physical
    direction: 南方近處
    description: >
      傑米努斯大河的支流從莊園南側蜿蜒而過，提供灌溉水源，
      也是農民夏季捕魚與婦女浣衣的去處。  # inferred: true
  - target: hess
    type: conceptual
    direction: 西方同盟
    description: >
      護憲伯爵艾德里安·馮·小赫斯是這位騎士在議會中的代言人。
      兩家領地雖相距甚遠，但在《大憲章》古典特權的旗幟下結成了牢固的同盟。  # inferred: true

# ── 內容物（contents）──
contents:
  - item: landmark
    name: 荊棘籬笆
    location: 莊園外圍
    description: >
      環繞莊園的野生黑莓與薔薇籬笆，高約兩米，春夏開暗紅花朵，秋冬結黑果。
      它既是邊界標記，也是防禦野獸與散兵的天然屏障，騎士的扈從常在籬笆後埋伏，監視過境軍隊的動向。  # inferred: true
  - item: landmark
    name: 憲章古道收稅站
    location: 莊園東側幹道
    description: >
      一座以木板與碎石搭建的簡陋哨站，是騎士行使《大憲章》特權、向過境軍隊徵收「道路維護稅」的據點。
      哨站木樑上掛著褪色的帝國旗幟與《大憲章》摘錄木牌。  # inferred: true
  - item: npc
    name: 荊棘維克騎士
    location: 石砌主屋
    description: >
      一位精通《大憲章》條文的小騎士領主，以「拒絕大領主軍隊無償通過」的特權聞名於護憲議會。
      他並非貪婪之人，只是深知沒有這項稅收，莊園連修繕籬笆的費用都拿不出。  # inferred: true

# ── 歷史事件（events）──
events:
  - id: thornwick_charter_standoff
    year: 823
    name: 荊棘維克攔路事件
    description: >
      格蘭迪斯大公的一支麥穗軍團分隊途經莊園，拒絕繳納道路維護稅。
      騎士率領扈從以荊棘籬笆為屏障擋住去路，雙方對峙三日，最終麥穗軍團指揮官因急於趕赴維特魯斯而妥協付款。
      此事成為護憲議會在選帝侯會議中的著名案例。  # inferred: true

