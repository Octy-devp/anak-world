# ── 身份錨定（必填）──
id: flamemark
name: 焰紋市
layer: settlement
region: 怒嘯山脈南麓
empire: 塞拉菲昂神聖帝國
parent_id: west_seraphion

# ── 敘事錨定（必填）──
description: >
  焰紋市（Flamemark）坐落於怒嘯山脈南麓，
  是塞拉菲昂神聖帝國境內隕鐵冷鍛工坊最密集的自治城市。

  這裡的工匠行會繼承了赭石行會的部分傳統，
  以冷鍛隕鐵與青銅混合技術聞名。
  城市上空終年飄蕩著鍛爐的黑煙，
  街道兩旁的建築外牆上佈滿了因高溫與錘擊而留下的焦痕，故得名「焰紋」。

  焰紋市與黑曜石守望者保持著一種曖昧的遠距離貿易關係，
  通過中間商獲取少量隕鐵原料，
  這使得它成為帝國軍事貴族們競相拉攏的對象。

  在主設定文獻中，焰紋市是「五大特別市聯盟」（The Pentapolis）成員之一，
  五城共享一個選帝侯投票權。
  第825年在位的執政官卡西烏斯·鐘塔（Cassius Bellspire）
  即出身於焰紋市工匠行會的冷鍛技師，
  是第一位出身工匠的執政官。

  焰紋市教會隕鐵礦井中有聖奴工作。
  第823年，聖女塞拉菲娜五世視察焰紋市慈惠所時，
  發現了聖奴之女瑪姬·泥芽（Maggie Mudsprout），
  這個在礦井中出生的八歲女孩竟能用嚼碎的草藥與礦井滲出的泥糊為其他聖奴兒童止血，
  塞拉菲娜五世當場落淚，堅持將她帶入靜默之塔。

  焰紋市郊的隕鐵冷鍛工匠家庭中，
  亦有父母擔任黑曜石守望者的間接貿易中間商。

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 鍛爐黑煙的焦糊與煤炭氣味
    - 隕鐵與青銅混合鍛打時的金屬灼熱氣息
    - 建築外牆焦痕散發的淡淡燒焦味
    - 山麓松針與腐殖土的清冷氣息 # inferred: true
  light: >
    鍛爐火光將建築外牆的焦痕映成跳動的暗紅色焰紋，
    終年不散的黑煙過濾了天光，使城市籠罩在一層灰濛濛的昏黃中；
    夜間工坊區的爐火在煙霧後方暈開血橙色光暈。
  temperature: >
    冷鍛工坊區因鍛爐而終年偏熱，
    街道與民居則受山麓涼風調節而溫和；
    靠近隕鐵礦井的區域陰冷潮濕，與鍛爐區形成鮮明對比。
  sound:
    - 鐵錘反覆錘擊隕鐵與青銅的鏗鏘聲
    - 鍛爐風箱的呼嘯與氣流轟鳴
    - 工匠行會作坊中的爭論與技術術語低語 # inferred: true
    - 山麓遠處的永恆風嘯 # inferred: true

# ── 屬性標籤──
properties:
  controlled_by: 焰紋市工匠行會
  access_level: public
  danger_level: medium
  religion: 普世教會西派（創世主阿薩）
  population: 28000  # inferred: true（隕鐵工坊密集的自由市，規模次於雙子門市）
  settlement_type: town
  wonders:
    - cold_forge_quarter

# ── 關係即通道（connections）──
connections:
  - target: the_howling_peaks
    type: physical
    direction: 北倚山脈
    description: >
      焰紋市坐落於怒嘯山脈南麓，
      山脈深處的隕鐵礦脈與黑曜石守望者是這座城市技術與原料的終極源頭。
  - target: vetustapolis
    type: conceptual
    direction: 西南遠方
    description: >
      焰紋市與維特魯斯聖座同屬五大特別市聯盟，
      執政官卡西烏斯·鐘塔於維特魯斯代表五城利益，
      兩城之間存在政治同盟與隕鐵貿易的緊密聯繫。
  - target: flumen_geminus
    type: physical
    direction: 西方河谷
    description: >
      傑米努斯河支流從山脈南麓流下，
      為焰紋市提供水運通道與鍛造用水，
      沿河可達沖積平原與雙子門市。 # inferred: true

# ── 內容物（contents）──
contents:
  - item: landmark
    name: 冷鍛工坊區
    location: 城市核心地帶
    guardian: 焰紋市工匠行會
    description: >
      帝國境內隕鐵冷鍛工坊最密集的街區，
      工匠行會繼承赭石行會傳統，以冷鍛隕鐵與青銅混合技術聞名。
      工坊終年運作，鍛爐黑煙不絕，
      街道兩旁建築外牆佈滿因高溫與錘擊留下的焦痕。
  - item: resource
    name: 教會隕鐵礦井
    location: 城市郊區，教會直轄
    guardian: 普世教會西派堅牢者
    description: >
      由教會控制的隕鐵礦井，聖奴在此從事艱苦的採掘與礦渣搬運勞作。
      礦井深處瀰漫隕鐵粉塵，許多聖奴因肺疾咳血卻仍需服勞役至死。
  - item: landmark
    name: 焰紋市慈惠所
    location: 下城區與礦井區交界
    guardian: 普世教會西派水流動者
    description: >
      教會設立的救濟機構，收養聖奴孤兒與貧困兒童。
      第823年聖女塞拉菲娜五世在此發現了瑪姬·泥芽的草藥天賦，
      這個營養不良的聖奴之女後來成為靜默之塔七柱候選人之一。
  - item: npc
    name: 卡西烏斯·鐘塔
    location: 維特魯斯（出身地為焰紋市）
    description: >
      第825年在位的五城執政官，出身焰紋市工匠行會的冷鍛技師，
      是第一位出身工匠的執政官，標誌著城市城中富戶對傳統貴族的挑戰。
      他的當選得益於焰紋市工匠行會與五城聯盟中工匠階層的政治動員。
  - item: npc
    name: 瑪姬·泥芽
    location: 維特魯斯靜默之塔（出身地為焰紋市教會隕鐵礦井）
    description: >
      八歲的聖奴之女，出生於焰紋市教會隕鐵礦井中。
      額頭在襁褓中便被烙上阿薩之眼的縮小版——候選人的特權標記，但終究仍是烙印。
      塞拉菲娜五世於第823年視察焰紋市慈惠所時，
      發現她能以嚼碎的草藥與礦井滲出的泥糊為其他聖奴兒童止血，當場落淚並將她帶入塔中。

# ── 歷史事件（events）──
events:
  - id: pentapolis_formed
    year: 788  # inferred: true（source: 隨著第788年帝國議會的癱瘓，維特魯斯周邊四座自由市與維特魯斯聖座結成五大特別市聯盟）
    name: 五大特別市聯盟成立
    description: >
      第788年帝國議會癱瘓後，焰紋市與維特魯斯聖座、雙子門市、鹽白城、阿申斯塔特
      結成「五大特別市聯盟」（The Pentapolis），共享一個選帝侯投票權，
      以抗衡格蘭迪斯與莫爾根等大地主的吞併。
  - id: cassius_bellspire_elected
    year: 822  # inferred: true（source: 第825年在位，任期三年，由十人桌選舉產生）
    name: 卡西烏斯·鐘塔當選執政官
    description: >
      焰紋市工匠行會的冷鍛技師卡西烏斯·鐘塔當選為五城執政官，
      是第一位出身工匠的執政官，
      標誌著城市城中富戶對傳統貴族的一次挑戰。
  - id: seraphina_finds_maggie
    year: 823
    name: 聖女發現瑪姬·泥芽
    description: >
      聖女塞拉菲娜五世視察焰紋市慈惠所時，
      發現聖奴之女瑪姬·泥芽能以草藥與礦井泥糊為其他聖奴兒童止血，
      當場落淚並堅持將她帶入靜默之塔，成為七柱候選人之一。

