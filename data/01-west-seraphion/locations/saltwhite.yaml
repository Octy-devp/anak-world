  population: 35000  # inferred: true（沿海自由市規模）
  settlement_type: town
  wonders:
    - salt_crystal_glassworks

# ── 關係即通道（connections）──
connections:
  - target: flumen_geminus
    type: physical
    direction: 北方水域
    description: >
      傑米努斯河在此注入海洋，鹽白城的漁船與商船經由河口水域往返，
      並利用河道向北進行食鹽走私貿易。
  - target: twin_gates
    type: conceptual
    direction: 北方海上同盟
    description: >
      五大特別市聯盟成員，與雙子門市之間存在海上貿易與海上衝突的複雜關係；
      雙子門市商人公會曾提高莫爾根艦隊通過傑米努斯河入海口的「聖輪維護稅」以協助鹽白城。
  - target: vetustapolis
    type: conceptual
    direction: 北方同盟
    description: >
      五大特別市聯盟成員，與維特魯斯聖座共享一個選帝侯投票權，
      在政治與軍事上互相支援以抗衡封建大領主。

# ── 內容物（contents）──
contents:
  - item: landmark
    name: 鹽晶玻璃工坊
    location: 臨海工坊區
    guardian: 玻璃行會
    description: >
      鹽白城最負盛名的玻璃吹制工坊，以本地提煉的純淨海鹽為助熔劑，
      生產出帶有獨特銀白光澤的玻璃器皿與窗櫺。
      工坊穹頂終年透著熔爐的橘紅色光芒。
  - item: resource
    name: 海鹽礦床
    location: 南方海岸淺灘與鹽田
    guardian: 鹽業公會
    description: >
      鹽白城經濟命脈，利用南方海岸的淺灘與潮間帶進行日曬蒸發提煉，
      產品供應帝國內陸，並暗中輸往凱撒里克帝國。
  - item: npc
    name: 私鹽走私商網絡
    location: 港口暗巷與河灣渡口
    description: >
      科拉之父曾參與的走私網絡，至今仍在莫爾根艦隊的封鎖間隙運作，
      將食鹽裝入利貝塔尼亞商船的貨艙，運往凱撒里克帝國。

# ── 歷史事件（events）──
events:
  - id: cora_family_shipwrecked
    year: 821
    name: 科拉家商船遭莫爾根私掠艦擊沉
    description: >
      莫爾根王國的「聖焰私掠艦隊」以「緝拿異端走私者」之名擊沉了私鹽走私商科拉·鹽歌家的商船，
      父母與兄長溺斃。科拉成為海上罹難孤兒，後被水流動者發現並帶入靜默之塔。

