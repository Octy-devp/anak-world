# ── 身份錨定（必填）──
id: vinetum_estate
name: 維內圖姆葡萄園莊園
layer: settlement
region: 格蘭迪斯大公國境內
empire: 塞拉菲昂神聖帝國
parent_id: west_seraphion

# ── 敘事錨定（必填）──
description: >
  維內圖姆葡萄園莊園是格蘭迪斯大公國境內一處旁支貴族的葡萄酒產地，
  位於中央沖積平原西緣的緩坡台地上。這裡的土壤富含礫石與石灰質，
  適合釀造供應維特魯斯貴族餐桌的高酸度白葡萄酒。

  莊園由一座低矮的石砌主屋、三座地下酒窖與連綿數里的棚架葡萄園組成。
  農奴與自由佃農在季節交替時修剪藤枝、採摘果實，
  釀成的酒液以橡木桶封裝，經驛道運往金穗堡與維特魯斯。
  格蘭迪斯大公奧托對葡萄酒稅抽成甚重，但允許莊園主保留部分佳釀
  用於賄賂教廷樞機與維特魯斯宮廷侍從。 # inferred: true

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 成熟葡萄發酵後的甜酸果香
    - 橡木桶內壁烘烤過的焦糖與香草氣息 # inferred: true
    - 石灰質土壤經日曬後的乾燥礦物味 # inferred: true
    - 秋季葡萄藤落葉腐熟後的泥土霉香 # inferred: true
  light: >
    清晨薄霧中，成排的葡萄藤在東方天際投下長長的陰影；
    正午陽光穿透棚架葉隙，在地面灑落斑駁的綠金色光點；
    黃昏時主屋石牆被夕照染成蜂蜜色，酒窖中僅有油脂燈的昏黃搖曳。 # inferred: true
  temperature: >
    夏季葡萄園在日曬下燥熱，但主屋厚牆內保持涼爽；
    冬季北風自平原長驅直入，農奴棚屋靠葡萄藤枝燃燒取暖；
    地下酒窖終年維持陰涼恆溫，是小冰期難得的穩定空間。 # inferred: true
  sound:
    - 秋風穿過葡萄藤架的沙沙細響 # inferred: true
    - 榨酒坊木輪與石槽碾壓葡萄的沉重節奏 # inferred: true
    - 莊園主以拉丁文朗讀釀酒帳冊的單調聲音 # inferred: true
    - 遠處驛道牛車駛過時的車輪吱嘎與鞭響 # inferred: true

