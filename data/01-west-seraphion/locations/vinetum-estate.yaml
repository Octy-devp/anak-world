# ── 關係即通道（connections）──
connections:
  - target: golden_spire_castle
    type: physical
    direction: 東北方
    description: >
      經中央平原驛道向東北方約一日半馬程可達金穗堡，
      莊園每年需向格蘭迪斯大公繳納固定配額的葡萄酒作為封建賦稅。 # inferred: true
  - target: the_flood_plain
    type: physical
    direction: 坐落於上
    description: >
      莊園位於中央沖積平原西緣的緩坡台地，
      土壤由傑米努斯河古河道沖積的礫石與石灰質構成。 # inferred: true

# ── 內容物（contents）──
contents:
  - item: landmark
    name: 石砌主屋與地下酒窖
    location: 莊園中央高地
    description: >
      低矮的石砌主屋附帶三座拱頂地下酒窖，存放著歷年釀造的橡木桶葡萄酒。
      部分陳年佳釀專供維特魯斯宮廷與教廷樞機，是莊園主政治周旋的籌碼。 # inferred: true
  - item: resource
    name: 礫石灰質葡萄園
    location: 莊園周邊緩坡
    description: >
      連綿數里的棚架葡萄園，土壤富含礫石與石灰質，
      出產的高酸度白葡萄酒在維特魯斯貴族間頗受青睞。 # inferred: true
  - item: npc
    name: 莊園主維內圖姆男爵
    location: 石砌主屋
    description: >
      格蘭迪斯大公國的旁支小貴族，以葡萄酒莊園的產出維繫家族存續。
      擅長在格蘭迪斯的重稅與維特魯斯宮廷的索賄之間周旋求生。 # inferred: true

