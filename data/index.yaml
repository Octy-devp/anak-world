id: ankora
name: 安納克大陸
layer: continent
description: >
  安納克大陸是世界樹「艾爾達拉」根系擁抱的廣袤大地，呈南北走向。
  大洪水後，被三道山脈與一道深淵重塑：
  北部山脈橫亙極北，中央怒嘯山脈如脊骨縱貫南北隔開東西兩大帝國，
  南部山脈則隔開了已知世界與大無底洞的迷霧。
  數條大河東西貫穿其間，中央沖積平原是整片大陸的糧食命脈。
atmosphere:
  scent:
    - 遠海鹽風
    - 松針與腐殖土
    - 深淵飄來的硫磺味
  light: 隨緯度與季節劇烈變化的自然天光
  temperature: 溫帶至寒帶，南北差異極大
  sound:
    - 怒嘯山脈的永恆風聲
    - 大河流域的流水低語
    - 遠方深淵的低頻嗡鳴
properties:
  controlled_by: 無
  access_level: public
  danger_level: medium
tags:
  - 大陸
  - 世界樹
  - 大洪水
empires:
  - id: west_seraphion
    name: 塞拉菲昂神聖帝國
    region: 西部
  - id: east_caesaric
    name: 凱撒里克帝國
    region: 東部
  - id: north_frost
    name: 北境諸邦
    region: 北部
  - id: south_libertania
    name: 自由城邦聯盟
    region: 東南部
  - id: secret_eldara
    name: 艾爾達拉秘境
    region: 西南部
geographies:
  - id: the_howling_peaks
    name: 怒嘯山脈
    region: 中央
    description: 縱貫大陸中央的南北山脈，如巨龍脊骨隔開東西兩大帝國
  - id: northern_mountains
    name: 北部山脈
    region: 北部
    description: 橫亙極北的山脈屏障，北境諸邦的家園
  - id: southern_mountains
    name: 南部山脈
    region: 南部
    description: 隔開已知世界與大無底洞的南方屏障
  - id: river_el
    name: 艾爾大河
    region: 中央
    description: 東西貫穿大陸的主河流，發源於西部高地，貫穿怒嘯山脈的斷劍峽谷，中游形成沖積平原
  - id: river_vitus
    name: 維特河
    region: 東部
    description: 凱撒里克境內的主要河流，發源於東部山區，向東南流淌入海，風息群島位於其出海口外海
  - id: river_frost
    name: 霜河
    region: 北部
    description: 發源於北部山脈，向南流淌，在沖積平原北側匯入艾爾大河
  - id: the_flood_plain
    name: 中央沖積平原
    region: 西部
    description: 艾爾大河中游的廣袤沖積平原，大陸糧食核心產區，目前由塞拉菲昂某選帝侯封建領有
  - id: eldara_worldtree
    name: 艾爾達拉世界樹
    region: 西南部
    description: 世界樹根系所在，森民（席爾凡）的唯美國度，緊鄰神聖帝國西南邊境
  - id: the_abyssus
    name: 阿比蘇斯大無底洞
    region: 南部
    description: 南部山脈以南的巨型深淵，隕鐵與失傳技術的源頭，目前無人知曉其底部
  - id: wind_isles
    name: 風息群島
    region: 東南部
    description: 維特河出海口外海的群島，自由城邦聯盟的核心，政體參考漢撒同盟與威尼斯混合聯邦制
