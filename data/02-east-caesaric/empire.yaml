# ── 身份錨定（必填）──
id: east_caesaric
name: 凱撒里克帝國
layer: empire
region: 東部
empire: 無
parent_id: ankora

# ── 敘事錨定（必填）──
description: >
  凱撒里克帝國位於安納克大陸東方，是舊艾森瓦爾王朝正統的繼承者，亦被稱為「晨星之國」。
  第726年，皇族親王馬庫斯·克羅諾斯在維特魯斯陷落之際，率領奧羅·伊格尼斯騎士團救出年幼的艾森瓦爾六世，
  展開了持續三年的「東方大遷徙」。第729年，東遷隊伍抵達傑米努斯河東岸的特爾馬嶺，建立首都奧斯堡（新維特魯斯）。
  馬庫斯拒絕稱帝，開創了獨特的「雙頭制」（Dyarchy）：攝政帝（克羅諾斯家族）掌實權，
  皇帝（艾森瓦爾血脈）為象徵正統的虛位元首，伊斯洛茲議會負責內政與制法。
  帝國核心信條為「正統不在血脈中，而在誓言裡」，這種「永遠的攝政」傳統已持續超過七十年。
  貴族們自稱「晨星帝國」，以晨星預示黎明來臨，暗示總有一日將收復維特魯斯。
  凱撒里克是軍事化社會，崇尚實用主義，石砌堡壘與厚重城牆為其建築特色，
  攝政帝所居的冰壁宮無設暖爐，主殿霜誓廳以黑曜石鋪地，牆壁厚達三米（均為推斷）。
  騎士穿板甲與鏈甲混合裝備，盔甲刻家族紋章與「霜生必須死」（Mori Glotta）縮寫。
  東方貴族懷念瓦萊里安時代的軍事榮譽，認為教會的祈禱無法替代刀劍。
  政治上與東派正教結盟，主張「政教共生」，與塞拉菲昂西派教廷對抗。
  至第825年，東方貴族已逐漸接受「東方強權」的身份，不再執迷於統一大陸，
  與塞拉菲昂帝國長期對峙但無大規模戰爭，同時面對北方白霜與南方利貝塔尼亞的雙重壓力。

