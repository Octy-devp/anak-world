# ── 歷史事件（events）──
events:
  - id: rescue_of_eisenval_vi
    year: 726
    name: 營救艾森瓦爾六世
    description: 馬庫斯·克羅諾斯率奧羅·伊格尼斯騎士團潛入陷落的維特魯斯皇宮，救出年僅五歲的艾森瓦爾六世
  - id: great_march_east
    year: 726
    name: 東方大遷徙
    description: 馬庫斯親王率領數萬名忠於舊皇室的貴族、文人、工匠與士兵東遷，歷經三年血路穿越阿比蘇斯裂谷與霜生襲擾
  - id: sword_oath_muster
    year: 726
    name: 劍誓池集結與分兵
    description: >
      馬庫斯親王救出幼帝後，率主力於維特魯斯郊外劍誓池駐紮三日，
      公開祭拜艾森瓦爾五世骨灰並招募追隨者。期間決定分兵東遷，
      主力（騎士團、幼帝、核心貴族）取道中路魯普圖斯隘口；
      工匠與商人五千人組成中路偏南隊伍沿傑米努斯河東岸東進；
      克羅諾斯家族部分成員分散至各路以降低風險。  # inferred: true
  - id: center_route_first_blocking
    year: 726
    name: 西麓第一次阻擊戰
    description: >
      東遷主力離開劍誓池後，在怒嘯山脈西麓丘陵遭遇赤土農民軍前鋒追擊。
      奧羅·伊格尼斯騎士團以兩百騎發動反衝鋒，掩護步兵與輜重隊撤離。
      此戰損失戰馬三十餘匹、騎士十二人，但贏得兩日時間。  # inferred: true
  - id: center_route_second_blocking
    year: 726
    name: 冬峽阻擊戰
    description: >
      第726年深冬，遷徙主力在一處無名峽谷被追兵咬住後衛。
      馬庫斯命步兵以盾牌與長矛結成盾牆阻斷谷道，弓箭手居高覆蓋射擊。
      阻擊持續整整一日夜，步兵損失過半，騎士團戰馬因嚴寒凍斃近百匹。
      貴族內部首次出現動搖：格蘭迪斯大公國的某位邊境伯爵暗中派人向巴爾塔薩輸誠。  # inferred: true
  - id: center_route_third_blocking
    year: 727
    name: 隘口西坡第三次阻擊
    description: >
      第727年早春，追兵精銳逼近魯普圖斯隘口西端。馬庫斯親率騎士團殘部
      （已不足一千五百騎）發動三次連續衝鋒，利用西坡緩坡地形撕裂農民軍方陣。
      此役騎士團損失超過三成，傷兵與輜重幾乎耗盡，但成功將追兵阻於隘口之外三日，
      為主力通過隘口爭取到關鍵時間。  # inferred: true
  - id: ruptus_pass_last_stand
    year: 727
    name: 魯普圖斯隘口背水一戰
    description: >
      第727年春，馬庫斯主力搶佔魯普圖斯隘口東端陡坡，利用地形優勢阻擋追兵。
      當騎士團因傷亡慘重而士氣瀕臨崩潰之際，年僅六歲的艾森瓦爾六世被護衛攜至陣前，
      以童聲說出「我不怕」——這一瞬間扭轉了士氣，騎士們發動最後一次決死衝鋒，
      將追兵徹底擊退。東坡陡坡自此成為無法逾越的屏障。  # inferred: true
  - id: center_south_column_departs
    year: 726
    name: 中路偏南隊伍出發
    description: >
      與主力分兵後，約五千名工匠、商人及其家眷在地方民兵與一小隊騎士團分隊護衛下，
      沿傑米努斯河東岸向東行進。他們攜帶了鍛造工具、作物種子、建築圖紙與家族神像，
      以河流為生命線獲取淡水與漁獲，並以烽火與騎兵傳令與主力保持聯絡。  # inferred: true
  - id: eastern_plain_reunion
    year: 728
    name: 東方平原會合
    description: >
      第728年夏，歷經兩年艱難行軍的中路偏南隊伍與主力在傑米努斯河東岸某支流交匯處會合。
      中路偏南隊伍因沿河補給較為充足，損失約一成；但因冬季結冰期與土匪襲擾，
      損失了全部三艘渡河木筏與近半圖紙資料。主力則減員超過四成，騎士團裝甲殘破不堪。  # inferred: true
  - id: ostburg_reconstruction_crisis
    year: 729
    name: 奧斯堡重建危機
    description: >
      第729年抵達特爾馬嶺後，馬庫斯面臨選址爭議：部分貴族主張遷至更低窪肥沃的河岸，
      但馬庫斯堅持高地以防禦與地熱資源。東方平原缺乏隕鐵礦脈，騎士團無法重鑄裝備；
      維特魯斯的石砌傳統因缺乏石材與技師而斷層，被迫採用木質框架與泥磚。
      冰壁宮故意不建暖爐，作為與士兵同甘共苦的政治姿態。  # inferred: true
  - id: invention_of_dyarchy
    year: 729
    name: 雙頭制的誕生
    description: >
      艾森瓦爾六世抵達東方時年僅八歲，身體虛弱、性格內向，完全無法親政。
      馬庫斯本可篡位，但選擇以「攝政帝」身份統治，宣稱皇帝為「正統之源」、
      自己為「政務之首」，並創設伊斯洛茲議會作為「制法之盾」。
      這一「雙頭制」既是對幼帝虛弱的現實回應，也是對西方專制錯誤的制度修正。  # inferred: true
  - id: founding_of_ostburg
    year: 729
    name: 奧斯堡建城
    description: 東遷隊伍抵達傑米努斯河東岸的特爾馬嶺，建立首都奧斯堡（新維特魯斯），並以實用主義風格興建冰壁宮
  - id: establishment_of_dyarchy
    year: 729
    name: 雙頭制確立
    description: 馬庫斯以「攝政帝」身份統治，開創皇帝（虛位正統）與攝政帝（實權）並存的雙頭制，伊斯洛茲議會為制法之盾
  - id: eastern_schism
    year: 754
    name: 東西教會大分裂
    description: 凱撒里克正式不承認西派教廷與《大憲章》，確立東派正教與「政教共生」體系，與塞拉菲昂決裂
  - id: death_of_eisenval_vi
    year: 765
    name: 艾森瓦爾六世去世
    description: 末代艾森瓦爾皇帝去世，無子嗣，臨終將隕鐵玉璽交還馬庫斯，馬庫斯·克羅諾斯改名為馬庫斯·克羅諾斯·艾森瓦爾，繼續攝政帝統治
  - id: death_of_marcus
    year: 770
    name: 初代攝政帝馬庫斯去世
    description: 馬庫斯·克羅諾斯·艾森瓦爾去世，臨終仍拒絕稱帝。其侄瓦萊里安·克羅諾斯·艾森瓦爾繼任攝政帝，延續「永遠的攝政」傳統

