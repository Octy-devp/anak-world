# ── 身份錨定（必填）──
id: delta_aurum
name: 奧魯姆河口三角洲
layer: geography
region: 東部
empire: 凱撒里克帝國
parent_id: ankora

# ── 敘事錨定（必填）──
description: >
  奧魯姆河口三角洲（Delta Aurum）是奧魯姆河注入東海前的最後一站，
  凱撒里克帝國東南隅的門戶。每年夏季，上游沖刷而下的泥沙在此堆積，
  不斷改變航道與沙洲形狀，只有熟悉水道的本地引水人才能安全進出。
  河口外海就是風息群島，商船從此啟航，帶著東方的隕鐵與香料前往群島交易。

  三角洲由紅樹林島群、蘆葦濕地與鹽沼交錯而成，
  水網密布如迷宮，漲潮時鹹水倒灌，退潮時露出金黃色的泥灘。
  凱撒里克帝國在此設有小型港口與燈塔，作為與自由城邦貿易的前哨。

  歷史上，這片三角洲從未遠離戰火。金灘燈塔曾在東西帝國海上摩擦中被焚毀後重建，
  石基上至今留有焦痕與弩箭彈孔；港口石牆在利貝塔尼亞海峽封鎖期間加筑了堡壘化胸牆，
  牆縫中嵌著無法取出的舊砲彈碎片。退潮時，漁民偶爾能在泥灘中撈到鏽蝕的隕鐵箭頭與碎甲片，
  這些沉默的遺物被統稱為「金灘骨」——三角洲的居民將它們熔鑄成漁網墜子，
  以這種方式記住戰爭，同時繼續生活。

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 鹹淡水混合的獨特腥甜  # inferred: true
    - 退潮後泥灘的硫化物氣息  # inferred: true
    - 紅樹林腐殖質的濃郁土腥  # inferred: true
    - 漁網與醃魚的鹹腥  # inferred: true
    - 遠處港口飄來的焦油與松脂  # inferred: true
  light: >
    清晨薄霧中的蒼白天光，正午時分強烈陽光在潟湖水面折射成碎金，
    黃昏時泥灘呈現金紅色澤（與奧魯姆河「黃金」之名遙相呼應）。
    夜間燈塔光束規律掃過水面。  # inferred: true
  temperature: >
    冬季溫和濕冷，夏季悶熱潮濕，午後雷陣雨後短暫涼爽。
    受海洋調節，溫差較內陸小。  # inferred: true
  sound:
    - 潮汐漲退的低語與泥沙摩擦聲  # inferred: true
    - 候鳥群起落的撲翅與鳴叫  # inferred: true
    - 船帆在風中的噼啪與引水人的號子  # inferred: true
    - 紅樹林間招潮蟹爬行的細碎聲響  # inferred: true
    - 遠處港口鐘聲與卸貨工人的呼喊  # inferred: true

# ── 屬性標籤（可選但建議填寫）──
properties:
  controlled_by: 凱撒里克帝國
  access_level: public
  danger_level: medium
  religion: 東派正教（官方）；漁民私下祭拜水神與風母  # inferred: true
  population: 3000  # inferred: true

# ── 關係即通道（connections）──
connections:
