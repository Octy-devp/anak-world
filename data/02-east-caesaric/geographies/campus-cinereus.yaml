# ── 身份錨定（必填）──
id: campus_cinereus
name: 東部灰燼荒地
layer: geography
region: 東部
empire: 凱撒里克帝國
parent_id: ankora

# ── 敘事錨定（必填）──
description: >
  東部灰燼荒地（Campus Cinereus）位於凱撒里克帝國東部內陸，
  地處奧魯姆河上游山區以東、怒嘯山脈東麓延伸地帶。
  這片廣闊的荒涼平原地表覆蓋著灰色火山灰與風化隕鐵碎屑，
  是大洪水時期地殼撕裂與隕鐵撞擊的綜合遺跡。  # inferred: true
  植被稀疏，僅有耐旱的灰茅草與苔蘚散佈於風蝕岩縫之間。  # inferred: true
  傳說此地曾是古代火山帶，大洪水後火山活動平息，
  留下一片死寂的灰色荒原，成為東西陸路最艱險的通道之一。  # inferred: true
  第780年，為應對利貝塔尼亞海峽封鎖，凱撒里克帝國開闢「灰燼商道」，
  穿越這片廢棄火山帶，通往里弗邦德的中立市場，
  由希爾德家族與艾恩斯家族共同護衛。
  灰燼平原上隨處可見燒焦的岩柱與半埋的鐵鏽碎片，
  是數次邊疆衝突與隕鐵私採戰爭遺留的痕跡。  # inferred: true
  商道沿線的無名墳塚與石砌避難所，
  見證了這片荒地從未被真正馴服的歷史。  # inferred: true

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 火山灰與乾燥塵土的嗆鼻氣息  # inferred: true
    - 硫磺殘留的刺鼻酸味  # inferred: true
    - 風化隕鐵碎屑的金屬腥甜  # inferred: true
  light: >
    終年灰濛濛的天光，正午時分亦僅有慘白的漫射；
    夕照偶爾將灰燼平原染成暗紅。  # inferred: true
  temperature: >
    晝夜溫差極大，白日乾熱如焚，夜間寒風刺骨。  # inferred: true
  sound:
    - 永恆不絕的風嘯穿過風蝕岩柱  # inferred: true
    - 灰燼商道駝隊的鈴鐺與車輪聲
    - 遠處山崩與岩石滾落的悶響  # inferred: true

