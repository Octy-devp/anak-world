# ── 內容物（contents）──
contents:
  - item: landmark
    name: 灰燼商道
    location: 橫貫荒地中部
    description: 第780年開闢的陸路商道，穿越廢棄火山帶通往里弗邦德，運輸隕鐵碎片、冷鍛武器與糧食
  - item: resource
    name: 隕鐵碎屑與火山礦物
    location: 荒地地表與淺層岩縫
    description: 大洪水時期隕鐵撞擊與火山活動遺留的碎片，可供冷鍛與冶煉  # inferred: true
  - item: landmark
    name: 廢棄火山帶
    location: 荒地中部區域
    description: 古代火山群遺跡，火山口已風化為盆地，邊緣留有凝固的熔岩流痕跡  # inferred: true
  - item: landmark
    name: 邊境哨站
    location: 灰燼商道沿線
    description: 凱撒里克帝國設立的少量哨站，用於護衛商隊與監控東方邊境  # inferred: true
  - item: landmark
    name: 灰燼堡壘
    location: 灰燼商道東端
    description: 原為木柵邊境哨站，第754年東西決裂後升級為石砌堡壘，駐紮奧羅·伊格尼斯軍團分隊，是監控東方邊境的前哨  # inferred: true
  - item: landmark
    name: 商道避難所
    location: 灰燼商道沿線
    description: 灰燼商道開闢戰後沿線修建的石砌避難所，配有地下倉庫與水源儲備，供商隊在劫掠襲擊時躲避  # inferred: true
  - item: landmark
    name: 無名墳塚群
    location: 廢棄火山帶邊緣
    description: 一片低矮的土丘與焦黑岩柱，傳說是邊疆軍閥叛亂與灰燼商道開闢戰中陣亡者的集體墓地，無人知曉確切數目  # inferred: true

# ── 歷史事件（events）──
events:
  - id: great_flood
    year: 0
    name: 大洪水
    description: 地殼撕裂與隕鐵撞擊形成灰燼荒地的地質基礎
  - id: east_border_militarization
    year: 754
    name: 東方邊境軍事化
    description: 東西教會大分裂後，凱撒里克帝國為防範西部滲透與東方未知威脅，將東部邊疆簡易哨站升級為石砌堡壘，並在灰燼荒地設立常駐軍團駐地  # inferred: true
  - id: ash_road_opening
    year: 780
    name: 灰燼商道開闢
    description: 面對利貝塔尼亞海峽封鎖，凱撒里克帝國開闢穿越東方邊境廢棄火山帶的商道，通往里弗邦德中立市場
  - id: ash_road_campaign
    year: 780
    name: 灰燼商道開闢戰
    description: 帝國軍隊在開闢商道過程中與荒地中的游牧劫掠者及廢棄礦坑盜礦集團發生衝突，希爾德家族與艾恩斯家族的聯合護衛隊確立了對商道的控制權  # inferred: true
  - id: meteoric_iron_wars
    year: 815
    name: 隕鐵私採戰爭
    description: 百年戰爭期間，帝國對隕鐵裝備的需求劇增，艾恩斯家族與盜礦集團在荒地淺層岩縫中爆發地下衝突，帝國稅吏與走私者的博弈持續數年  # inferred: true

