properties:
  controlled_by: 凱撒里克帝國邊境軍團
  access_level: restricted
  danger_level: high
  religion: 東派正教（橋頭設有小型聖所，供奉守橋聖人）  # inferred: true
  population: 300  # 橋頭哨站與商販常駐人口；inferred: true

