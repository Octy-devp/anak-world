  - target: east_caesaric
    type: conceptual
    direction: 核心領土
    hidden: false
    description: 七橋峽谷是凱撒里克東部山區與平原之間的戰略咽喉，帝國邊境軍團駐防於此
  - target: the_howling_peaks
    type: physical
    direction: 西方
    hidden: false
    description: 東部山脈為怒嘯山脈東向延伸的褶皺山系，地質同源，隕鐵礦脈稀少但岩層結構相似
  - target: campus_cinereus
    type: physical
    direction: 西南方
    hidden: false
    description: 峽谷西南麓與灰燼荒地相鄰，某些季節可見遠方荒地升起的灰燼隨風飄至橋面

# ── 內容物（contents）──
contents:
  - item: landmark
    name: 古橋遺跡
    location: 峽谷最底層
    description: >  # inferred: true
      前帝國時代邊疆領主以隕鐵鎖鏈與木板搭建的簡易吊橋遺跡，
      現已鏽蝕殆盡，僅餘兩根嵌入崖壁的鐵樁。
  - item: landmark
    name: 攝政橋
    location: 峽谷最高層
    description: >  # inferred: true
      近年新建的鐵索橋，可容四馬並行，橋頭立有克羅諾斯家族晨星紋章與攝政帝銘文。
      貴族與軍隊專用通道。
  - item: landmark
    name: 斷橋
    location: 峽谷中層偏北
    description: >  # inferred: true
      某次春季融雪引發的山崩中坍塌半截的石拱橋。
      殘餘橋體成為鷹巢與冒險者的臨時落腳點。
  - item: npc
    name: 橋頭哨站邊境軍團
    location: 攝政橋東端與霜誓橋西端
    description: >  # inferred: true
      凱撒里克帝國邊境軍團的常駐哨兵，負責盤查過峽谷的一切行人，徵收過橋稅，
      並監控來自西方山區的動靜。
  - item: landmark
    name: 焦痕橋
    location: 峽谷中層（第四座橋）
    description: >  # inferred: true
      第766年阻擊戰中被焚毀後重建的石拱橋。
      橋墩上留有明顯的燒焦痕跡與修補的灰泥，橋面兩側擠滿商販棚屋。
      當地商販相信焦痕能驅邪，常在燒痕處懸掛護身符。

  - item: landmark
    name: 橋頭堡壘
    location: 攝政橋東端
    description: >  # inferred: true
      第788年橋頭政變後由木製哨塔升級而成的石砌防禦工事。
      堡壘設有可升降的鐵閘門、弩炮平台與藏兵洞，
      牆壁上刻滿了歷代哨兵發展出的盤查口令與手勢暗號。
      堡壘地下儲藏室據說存放著政變時繳獲的叛軍武器與密信，
      但邊境軍團禁止任何人進入。

  - item: npc
    name: 老穆拉（Murrah the Gorge-Wise）
    location: 焦痕橋橋頭商販棚屋區
    description: >  # inferred: true
      在峽谷生活了七十年的老婦，家族世代為過境商隊擔任嚮導。
      她熟知每座橋的薄弱處與崖壁上的秘密小徑，據說在多場邊境衝突中
      同時向雙方出售情報、鹽糧與嚮導服務，被當地人稱為「峽谷的風向雞」。
      她從不談論自己的過去，但每當商隊詢問「哪座橋最安全」時，
      她總是意味深長地回答：「最安全的是從未被需要過的那座。」

  - item: resource
    name: 峽谷岩鹽
    location: 崖壁深處鹽脈
    description: >  # inferred: true
      東部山脈褶皺帶中蘊藏的岩鹽礦脈，品質不及南方海鹽，但足以供應東部內陸需求。

# ── 歷史事件（events）──
events:
  - id: ancient_bridge_founding
    year: -200
    name: 古橋始建
    description: >  # inferred: true
      東部山區早期邊疆領主為控制東西交通，在峽谷最窄處以隕鐵鎖鏈搭建首座簡易吊橋。
  - id: bridge_four_burning
    year: 766
    name: 焦痕橋阻擊戰
    description: >  # inferred: true
      第754年東西教會大分裂後，邊境軍事化急劇升級。
      第766年秋，一支疑似受塞拉菲昂傭兵指揮的武裝滲透部隊趁夜試圖穿越峽谷東進。
      東遷軍在第四橋上設伏阻擊，激戰三日後為阻斷追兵而焚毀橋面中央段。
      此橋後重建，但橋墩上至今留有燒焦痕跡，當地人遂稱之為「焦痕橋」。
      據說戰鬥中有一名東派正教軍事修道院的戰鬥僧侶獨守橋頭，以肉身阻擋敵軍衝鋒，
      其遺體墜入峽谷後被追封為守橋聖人。

  - id: bridgehead_coup
    year: 788
    name: 橋頭政變
    description: >  # inferred: true
      第788年，邊境軍團第四大隊指揮官洛塔爾·鋼誓（Lothar Steel-Oath）
      拒絕向奧斯堡繳納過橋稅收入，宣布峽谷為「獨立軍事領地」，
      並向過往商隊徵收高額通行費。攝政帝瓦萊里安一世派遣奧羅·伊格尼斯騎士團鎮壓。
      叛軍在攝政橋上與騎士團展開激戰，洛塔爾最終被騎槍擊中墜入峽谷身亡。
      戰後，攝政帝下令將橋頭哨塔升級為石砌堡壘，並在橋面增設可拆卸的鐵閘門與弩炮平台，
      橋樑的層疊結構自此被正式劃分為軍事分區，演變為後來的社會階層隔離。

  - id: bridge_six_collapse
    year: 798
    name: 斷橋山崩事件
    description: >  # inferred: true
      第六座石拱橋在春季融雪引發的山崩中坍塌半截，
      當時橋上一支過境商隊墜入峽谷，此後該橋廢棄。
      然而，峽谷老居民中流傳著另一種說法：山崩前夜，有哨兵看見數名黑衣人在橋墩附近活動，
      隨後傳來沉悶的爆破聲。次年，攝政帝的調查人員在橋墩殘骸中發現了疑似人為鑿痕的痕跡，
      但官方報告堅稱坍塌純屬自然災害。這一疑雲使得斷橋成為峽谷最陰森的地標——
      冒險者們宣稱在夜間能聽見橋下傳來金屬敲擊岩壁的迴響，
      彷彿有什麼東西仍被困在崩塌的橋體之中。
  - id: regent_bridge_completion
    year: 812
    name: 攝政橋竣工
    description: >  # inferred: true
      第三代攝政帝瓦萊里安·克羅諾斯·艾森瓦爾下令興建第七座橋，
      以鐵索混泥土技術打造可容四馬並行的軍用要道，鞏固東部山區防線。

