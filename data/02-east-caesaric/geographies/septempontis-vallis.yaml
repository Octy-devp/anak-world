# ── 身份錨定（必填）──
id: septempontis_vallis
name: 七橋峽谷
layer: geography
region: 東部
empire: 凱撒里克帝國
parent_id: ankora

# ── 敘事錨定（必填）──
description: >  # inferred: true（峽谷整體描述、七座橋的具體名稱、歷史、結構與社會功能均為推斷）
  七橋峽谷（Septempontis Vallis，意為「七座橋之谷」）位於奧魯姆河上游山區段，
  河流在此切穿東部山脈（怒嘯山脈東向延伸的褶皺山系），形成長達十二里的深邃峽谷。
  峽谷兩岸峭壁如削，最窄處僅容一輛馬車通行，河水在峽底翻湧咆哮，終年水霧瀰漫。

  七座橋樑橫跨峽谷於不同高度與歷史時期，從谷底到崖頂層疊錯落，
  見證了凱撒里克帝國控制東部山區的工程史。
  最底層的「古橋」據說是前帝國時代邊疆領主以隕鐵鎖鏈與木板搭建的簡易吊橋，
  現已鏽蝕殆盡，僅餘兩根嵌入崖壁的鐵樁；
  其上的「霜誓橋」與「晨星橋」為帝國初年所建石拱橋，供軍隊與商旅通行；
  第四座「焦痕橋」與第五座為平民貿易橋，橋面兩側擠滿商販棚屋，
  焦痕橋的橋墩上仍留有第766年阻擊戰的燒焦痕跡；
  第六座「斷橋」於某次春季融雪引發的山崩中坍塌半截，
  殘餘橋體成為鷹巢與冒險者的臨時落腳點；
  最高的第七座「攝政橋」是近年新建的鐵索橋，可容四馬並行，
  橋頭立有克羅諾斯家族的晨星紋章與「正統不在血脈中，而在誓言裡」的銘文。

  峽谷是凱撒里克東部山區與核心農業平原之間的唯一陸路通道，
  戰略地位極其重要。帝國邊境軍團在此設有哨站，盤查所有過往行人。
  橋樑的層疊結構使得不同社會階層的人實際上「各走各路」——貴族與軍隊走最高層，
  商人走中層，平民與罪犯被迫擠在搖搖欲墜的最底層。
  這種分層最初源於第788年橋頭政變後的軍事分區管理，後逐漸固化為社會習俗。

  戰爭的痕跡無處不在：崖壁凹陷處嵌著腐朽的攻城梯殘骸與鏽蝕鐵鉤，
  橋墩上密佈著刀劈斧鑿的陳年痕跡，某些橋樑的夾層中據說藏有叛軍遺留的密道與暗門，
  但無人敢於深入查證。

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 峽谷水霧的潮濕礦物味
    - 奧魯姆河上游的清冽河水味
    - 老舊木橋的腐朽松脂與鐵鏽
    - 石橋縫隙間生長的苔蘚與地衣
    - 最底層橋面的牲畜糞便與污水  # inferred: true
    - 高處新橋的瀝青與石灰氣味  # inferred: true
  light: >  # inferred: true
    峽谷底部終年幽暗，僅正午有片刻陽光直射谷底；
    中層橋面常年籠罩在散射的蒼白天光與水霧折射之間；
    最高層攝政橋上則開闊明亮，可遠眺東方平原的金紅夕照（Aurum 之色）。
  temperature: >  # inferred: true
    峽谷內恆溫陰涼，不受外界季節劇烈影響；
    越接近谷底越濕冷，水霧使人衣履盡濕；
    最高層橋面風大，冬季結霜。
  sound:
    - 峽谷底部河水的湍急轟鳴
    - 鐵索橋在風中的吱嘎呻吟
    - 石橋上馬蹄與車輪的迴盪聲響
    - 橋頭哨兵的號角與盤查口令  # inferred: true
    - 中層商販的吆喝與討價還價  # inferred: true
    - 風穿峽谷的永恆尖嘯  # inferred: true

