# ── 身份錨定（必填）──
id: north_frost
name: 北境諸邦
layer: empire
region: 北部
empire: 無
parent_id: ankora

# ── 敘事錨定（必填）──
description: >
  北境諸邦並非單一國家，而是散居於約恩維德山脈與極北冰原之間的人類城邦、部落與獨立領地的鬆散集合。
  其核心成員包括：
  （一）霍羅托里亞——由自稱「瓦萊里安第一公民」繼承者的軍事領袖統治的溫泉城邦，
  拒絕普世教會，堅持「大陸眾神」信仰，第790年後徹底封閉國門，頒布《工藝封存令》；
  （二）伯格施米德——隕鐵礦山與鍛造中心，曾是塞拉菲昂的選帝侯之一，
  現已封閉礦道、不再過問外界；
  （三）各種小領主、部落聯盟與礦山聚落，彼此無統屬關係，僅以地理鄰近與共同禦寒需求維繫鬆散聯繫。
  與此同時，更北方的霜生部族（The Frostborn）於第801年經歷宗教起義，
  建立了「阿爾比諾克拉西亞」（The Revelation of Whitefrost）。
  霜生擁有文字、經典、倫理法與常備軍，是與人類北境諸邦並存的獨立文明，不屬於北境諸邦的一部分。
  第810年，霍羅托里亞與阿爾比諾克拉西亞達成「冰晶協定」，進行技術交換；
  雙方邊界持續進行「邊界禮儀戰」——有限的襲擊與反襲擊，戰後交換俘虜與技術。
  至第825年，人類城邦與霜生之間的關係已從「消滅異端」轉為「敵對合作」，
  這種關係令南方帝國無法理解。

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 霍羅托里亞溫泉的硫磺  # inferred: true
    - 冰原的無味空虛  # inferred: true
    - 礦山的金屬粉塵  # inferred: true
    - 霜生邊界的緊張氣息  # inferred: true
  light: >
    極晝的慘白、極夜的漆黑與極光（綠與紫的舞動）、
    溫泉谷地的蒸汽折射  # inferred: true
  temperature: >
    極寒，但溫泉谷地終年溫暖  # inferred: true
  sound:
    - 冰川移動的深層轟鳴  # inferred: true
    - 溫泉的氣泡咕嚕  # inferred: true
    - 邊界禮儀戰的短促廝殺  # inferred: true
    - 霍羅托里亞封閉國門後的死寂  # inferred: true

# ── 屬性標籤（可選但建議填寫）──
properties:
  controlled_by: 無單一統治者
  access_level: restricted
  danger_level: high
  religion: 大陸眾神信仰（霍羅托里亞）、山神信仰與部落禁忌（其他聚落）
  population: null

# ── 關係即通道（connections）──
connections:
  - target: northern_mountains
    type: physical
    direction: 南界
    hidden: false
    description: 約恩維德山脈是北境諸邦與南方帝國的天然屏障
  - target: jarnvid_river
    type: physical
    direction: 南麓
    hidden: false
    description: 約恩維德河發源於山脈，向南流入傑米努斯大河
  - target: the_howling_peaks
    type: conceptual
