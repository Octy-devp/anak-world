    description: 怒嘯山脈東北連綿山脈與約恩維德山脈相接

# ── 歷史事件（events）──
events:
  - id: battle_of_utter_north
    year: 485
    name: 極北會戰
    description: >
      決戰在極北荒原爆發，安納克聯軍在瓦萊里安領導下擊潰霜生主力，
      霜生大可汗死於冰原。此役標誌著「鐵器時代霸權」的確立，
      也為霍羅托里亞的起源埋下種子——部分聯軍選擇留守極北。
  - id: albinocracy_founding
    year: 803
    name: 霜生宗教起義與阿爾比諾克拉西亞誕生
    description: >
      「冰血先知」出現於極北之地，宣稱嚴冬之神卡德摩斯並非要求人肉為糧，
      而是要求在嚴寒中證明靈魂純潔。第803年頒布《白經》，
      建立「冰眾公社」與「嚴冬唯一論」。霜生從此擁有文字、經典、倫理法與常備軍，
      不再是南方史書中的「野蠻部落」。
  - id: crystal_pact
    year: 810
    name: 冰晶協定
    description: >
      阿爾比諾克拉西亞與霍羅托里亞達成技術交換協定。
      雙方邊界持續進行「邊界禮儀戰」——有限襲擊與反襲擊，戰後交換俘虜與技術情報。
      這種「敵對合作」令南方帝國貴族無法理解。

