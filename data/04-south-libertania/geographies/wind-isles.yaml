id: wind_isles
name: 風息群島
layer: geography
region: 東南部
empire: 自由城邦聯盟
parent_id: ankora

description: >
  風息群島坐落於奧魯姆河出海口外海，是安納克大陸最開放、最多元、最富庶的區域，
  被譽為「東海明珠」與「季風貿易的心臟」。這片群島並非單一大島，而是由數十個大小島嶼
  組成的潟湖群島，外有珊瑚與火山岩構成的環形島鏈阻擋風暴，內有平靜淺水的白沙潟湖，
  四座主要城邦坐落於主島群之上，以石橋與堤道相互連接，宛如威尼斯潟湖中的石造城市。

  群島的政體參考漢撒同盟、威尼斯共和國與古印尼室利佛逝的混合聯邦制，
  各城邦以「薩穆德拉盟誓」（Samudra Pact）維繫，沒有常備軍，僅在季風來臨時集結帆隊聯防。
  島民信奉「風母與七洋靈」的泛靈信仰，每艘商船出航前必須在船頭獻上香料與珊瑚粉，
  祈求風母賜予順風與七洋靈庇護航程。

  群島的船隻設計獨特，雙體帆船可以逆風航行，類似波利尼西亞的航海技術。
  東北季風（冬季）帶來乾冷風，適合向西航行前往塞拉菲昂與凱撒里克；
  西南季風（夏季）帶來濕熱風，適合向東前往未知海域與傳說中的「香料島」。

atmosphere:
  scent:
    - 全年瀰漫的鹽風與海藻腥氣
    - 菲惹港各國香料的混合辛香
    - 昂科拉造船廠的松脂、焦油與醃魚鹹腥
    - 塔拉薩法律大廳的羊皮紙與乾燥墨水味
    - 艾歐利斯議政廳的純淨海風
    - 東側紅樹林島的腐殖質與爛泥氣息
    - 珊瑚墓場海域詭異的紫黑色珊瑚腥味
  light: >
    熱帶的強烈陽光投射銳利陰影，潟湖水面的波光粼粼將光線折射成碎鑽般的光點。
    夕照時分，四座城邦的石造建築與木質高腳屋鍍上金紅色光輝。
    夜間某些海域會出現生物發光的「藍眼淚」現象，與漫天星空相互輝映。
  temperature: >
    常年濕熱，無冬季。季風來臨時帶來短暫涼爽，午後常有雷陣雨驟降，
    雨後空氣悶熱而黏膩。
  sound:
    - 帆索在風中的噼啪作響
    - 菲惹港碼頭上多國語言的喧囂與錢幣碰撞聲
    - 潮汐在潟湖中的漲退低語
    - 艾歐利斯議政廳風穿過石柱的鳴響
    - 遠方暴風雨在環礁外的雷鳴
    - 老水手傳說中海底巨大生物的低頻鳴叫（被視為風母的聲音）
    - 昂科拉船塢的斧頭劈木聲與鐵錘敲釘聲

properties:
  controlled_by: 風息議會（四城邦聯合體）
  access_level: public
  danger_level: low
  religion: 風母與七洋靈泛靈信仰
  population: 120000

connections:
  - target: aurum_river
    type: physical
    direction: 西北方
    description: 奧魯姆河從凱撒里克東部山區流淌而來，泥沙與養分在出海口形成群島的珊瑚礁基礎
  - target: south_libertania
    type: conceptual
    direction: 核心
    description: 群島是自由城邦聯盟的政治與經濟核心，四城邦代表組成風息議會
  - target: the_abyssus
    type: conceptual
    direction: 西方遠海
    description: 某些老水手聲稱，在群島最南端的暴風夜，可以聽到深淵的低頻嗡鳴隨海風傳來
  - target: eldara_worldtree
    type: conceptual
    direction: 西方
    description: 森民的某些漂流木與種子偶爾被洋流帶到群島海岸，被視為世界樹的饋贈
  - target: the_howling_peaks
    type: conceptual
    direction: 西方遠洋
    description: 群島的礦石與隕鐵主要從怒嘯山脈西麓的港口經海路運來

contents:
  - item: landmark
    name: 外環礁
    location: 群島外圍
    description: >
      由珊瑚與火山岩構成的環形島鏈，阻擋外海風暴。環礁上點綴著燈塔與瞭望站，
      守夜人使用古印尼室利佛逝傳下的擊鼓傳訊系統，在季風季節預警颱風與海盜。

  - item: landmark
    name: 內潟湖
    location: 環礁內部
    description: >
      平靜的淺水區，水深不超過十米，海底是白沙與海草床。主要航道經過此處，
      雙體帆船在海草床上投下優雅的陰影，儒艮偶爾浮出水面換氣。

  - item: landmark
    name: 紅樹林島
    location: 群島東側
    description: >
      東側的無人小島，紅樹林茂密盤根錯節，是招潮蟹與彈塗魚的家園，
      也是海盜與走私者的藏身處。傳說某些紅樹林水道可以通往菲惹港的地下倉庫。

  - item: landmark
    name: 珊瑚墓場
    location: 群島南部海域
    description: >
      某些海域的珊瑚因隕鐵輻射而呈現詭異的紫黑色，漁民視為禁忌，不敢在此捕魚。
      夜間偶有微光從海底透出，有人說那是隕鐵殘留的能量。

  - item: landmark
    name: 塔拉薩（Thalassa）
    location: 主島群西北島
    description: >
      群島的行政與法律核心，古老石造港口城市。建築風格類似威尼斯總督宮，
      宏偉的石造法律大廳牆上刻滿商法條文與薩穆德拉盟誓的原始文本。
      空氣中瀰漫羊皮紙與乾燥墨水的氣味，法庭上的辯論聲與銅鐘聲日夜迴盪。
      法學家與書吏在此聚集，仲裁城邦間的貿易糾紛。

  - item: landmark
    name: 菲惹港（Free Port）
    location: 主島群東北島
    description: >
      開拓先鋒與貿易中樞，巨型碼頭延伸到潟湖之中，桅杆如林。
      木質高腳屋與石造倉庫混雜，街道狹窄而喧囂。
      各國香料的混合辛香瀰漫空氣，多國語言的喧囂與錢幣碰撞聲不絕於耳。
      流亡技術人才與冒險家在此落腳，是群島最具活力也最混亂的城邦。

  - item: landmark
    name: 昂科拉（Anchora）
    location: 主島群東南島
    description: >
      群島最大的造船廠與醃魚場所在。巨大的木質船塢沿著海岸線排列，
      空氣中瀰漫松脂、焦油與醃魚的鹹腥味。
      斧頭劈木聲與鐵錘敲釘聲日夜不停，北海運來的木材與糧食在此卸貨，
      調度到群島各處。昂科拉的造船師傅掌握雙體帆船的核心技術，
      他們的工藝秘方代代相傳，不輕易外流。

  - item: landmark
    name: 艾歐利斯（Aeolis）
    location: 主島群中央島
    description: >
      風息議會的永久召開地，純粹中立協商區域。核心建築是一座露天圓形議政廳，
      無頂設計讓風直接吹入廳堂，象徵風母見證所有盟約。
      這裡幾乎沒有其他氣味，只有純淨海風的鹽味；
      風穿過石柱的鳴響與代表的低語是唯一的聲音。
      四城邦代表在此平等協商，無人可攜帶武器進入。

events:
  - id: samudra_pact_signed
    year: 892
    name: 薩穆德拉盟誓簽訂
    description: >
      四城邦代表在艾歐利斯議政廳簽訂薩穆德拉盟誓（Samudra Pact），
      確立自由城邦聯邦制的基本框架，約定共同防禦、自由貿易與風息議會的仲裁權。
      盟誓以古印尼梵文與安納克通用語雙語刻寫，原件保存於塔拉薩法律大廳。

  - id: wind_mother_appeared
    year: 967
    name: 風母顯聖傳說
    description: >
      傳說在某個暴風之夜，群島所有燈塔同時無風自亮，
      漁民聲稱聽到女性歌聲從風中傳來，指引迷航船隻安全入港。
      此後「風母」信仰在群島迅速普及，成為泛靈信仰的核心。

