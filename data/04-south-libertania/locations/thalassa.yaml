# ── 身份錨定（必填）──
id: thalassa
name: 塔拉薩
layer: settlement
region: 風息群島
empire: 自由城邦聯盟
parent_id: south_libertania

# ── 敘事錨定（必填）──
description: >
  塔拉薩（Thalassa）坐落於風息群島主島群的西北島，是群島的行政與法律核心，
  一座古老的石造港口城市。
  建築風格類似威尼斯總督宮，宏偉的石造法律大廳牆上刻滿商法條文與薩穆德拉盟誓的原始文本。
  空氣中瀰漫羊皮紙與乾燥墨水的氣味，法庭上的辯論聲與銅鐘聲日夜迴盪。
  法學家與書吏在此聚集，仲裁城邦間的貿易糾紛。
  作為自由城邦聯盟的法律中樞，塔拉薩約有三萬常住人口，  # inferred: true
  其中近半數從事法律、書記與檔案管理相關職業。  # inferred: true
  薩穆德拉盟誓的雙語原件自第892年簽訂以來便保存於法律大廳的密室之中，  # inferred: true
  每年盟誓紀念日，四城邦代表會在此公開朗誦盟約條文。  # inferred: true

# ── 感官錨定（必填）──
atmosphere:
  scent:
    - 羊皮紙與乾燥墨水味
  light: >
    熱帶強光投射銳利陰影，夕照時石造建築鍍上金紅色光輝
  temperature: >
    常年濕熱無冬，午後雷陣雨後悶熱黏膩
  sound:
    - 法庭辯論聲與銅鐘聲日夜迴盪

