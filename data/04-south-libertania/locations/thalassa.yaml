# ── 身份錨定（必填）──
id: thalassa
name: 塔拉薩
layer: settlement
region: 風息群島
empire: 自由城邦聯盟
parent_id: south_libertania

# ── 敘事錨定（必填）──
description: >
  塔拉薩（Thalassa）坐落於風息群島主島群的西北島，是群島的行政與法律核心，
  更為重要的是——它是上古時代「塔拉薩七海同盟」（Thalassan League）的發源地，
  整個安納克海上文明的搖籃。

  早在青銅時代晚期，當大陸尚處於部落混戰與旱災的陰霾中，塔拉薩的商人便率先建立永久性市集，
  駕駛輕快帆船壟斷跨區貿易。他們不崇拜任何神祇，只信奉「契約與風向」，
  一種務實而自由的海洋文化由此萌芽。
  第145年，深穴的科爾攜帶「冷鍛隕鐵」技術逃至塔拉薩海邦，
  促成鐵器時代的技術擴散，其背叛標誌著「絕對孤立」技術壟斷的終結。
  塔拉薩以此為基礎發展出第一代鐵甲艦隊，用隕鐵加固船體，對抗北方海域浮冰。

  第483年費羅斯誓約成立時，塔拉薩七海同盟與馬爾施克羅內、伯格施米德及森民並坐談判桌，
  老約拿的艦隊提供海上補給線，成為擊潰霜生的關鍵後勤力量。
  第754年，塔拉薩七海同盟代表更成為塞拉菲昂帝國六大選帝侯之一——
  一個外國海權勢力擁有選舉西方皇帝的權力，此後成為塞拉菲昂政治中無法忽視的外部變數。

  如今的塔拉薩雖已退居風息群島，但其海洋傳統由利貝塔尼亞完整繼承。
  城市本身仍是一座古老的石造港口，建築風格類似威尼斯總督宮，
  宏偉的石造法律大廳牆上刻滿商法條文與薩穆德拉盟誓的原始文本。
  法學家與書吏在此聚集，仲裁城邦間的貿易糾紛。
  作為自由城邦聯盟的法律中樞，塔拉薩約有三萬常住人口，  # inferred: true
  其中近半數從事法律、書記與檔案管理相關職業。  # inferred: true
  薩穆德拉盟誓的雙語原件自第892年簽訂以來便保存於法律大廳的密室之中，  # inferred: true
  每年盟誓紀念日，四城邦代表會在此公開朗誦盟約條文。  # inferred: true

