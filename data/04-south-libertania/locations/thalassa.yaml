# ── 內容物（contents）──
contents:
  - item: landmark
    name: 石造法律大廳（Grand Courthouse）
    location: 城市中央
    description: >
      宏偉的石造建築，牆上刻滿商法條文與薩穆德拉盟誓的原始文本。
      法學家與書吏在此聚集，仲裁城邦間的貿易糾紛。
      薩穆德拉盟誓雙語原件保存於大廳密室。  # inferred: true

  - item: landmark
    name: 七海同盟古市集（Thalassan League Market）
    location: 港口東翼
    description: >
      上古時代塔拉薩七海同盟建立的第一座永久性市集遺址。
      石砌拱廊下仍保留著青銅時代晚期的交易柜台與契約石碑，
      部分石碑以古安納克語刻寫最早的商法條文。
      市集中央立有一尊無面像——象徵「契約高於神恩」的匿名商人守護神。  # inferred: true

  - item: document
    name: 老約拿的航海圖（Jonah's Chart）
    location: 塔拉薩海事學院密室  # inferred: true
    description: >
      第486年老約拿死於傷寒前交予「風息者」萊恩的航海圖，
      記載了唯一深入阿比蘇斯並生還的航線，以及「冰舌航法」的秘訣。
      原圖已隨萊恩遷徙至風息群島，塔拉薩保存的是一份精細摹本。  # inferred: true

# ── 歷史事件（events）──
events:
  - id: thalassan_league_founded
    year: 60
    name: 塔拉薩七海同盟建立  # inferred: true
    description: >
      青銅時代晚期，塔拉薩商人在群島建立永久性市集，
      駕駛輕快帆船壟斷跨區貿易，不崇拜神祇，只信奉「契約與風向」。
      務實而自由的海洋文化由此萌芽，成為安納克海上文明的源頭。

  - id: cold_forge_arrived
    year: 145
    name: 冷鍛隕鐵傳入塔拉薩
    description: >
      深穴的科爾攜帶「冷鍛隕鐵」技術逃至塔拉薩海邦，
      促成鐵器時代的技術擴散，標誌著黑曜石守望者「絕對孤立」技術壟斷的終結。
      塔拉薩以此為基礎發展出第一代鐵甲艦隊。

  - id: thalassan_ironclad_fleet
    year: 106
    name: 第一代鐵甲艦隊建成  # inferred: true
    description: >
      塔拉薩七海同盟以冷鍛隕鐵技術打造第一代鐵甲艦隊，
      用隕鐵加固船體以對抗北方海域浮冰，確立了塔拉薩在安納克海權中的霸主地位。

  - id: samudra_pact_signed
    year: 892
    name: 薩穆德拉盟誓簽訂
    description: >
      四城邦代表在艾歐利斯議政廳簽訂薩穆德拉盟誓，
      確立自由城邦聯邦制的基本框架，約定共同防禦、自由貿易與風息議會的仲裁權。
      盟誓原件保存於塔拉薩法律大廳。

  - id: thalassa_electorate
    year: 754
    name: 塔拉薩成為塞拉菲昂選帝侯
    description: >
      第754年，巴爾塔薩為對抗莫爾根而需要塔拉薩海軍支持，
      授予塔拉薩七海同盟代表塞拉菲昂帝國選帝侯席位。
      一個外國海權勢力擁有選舉西方皇帝的權力，
      此後成為塞拉菲昂政治中無法忽視的外部變數。

