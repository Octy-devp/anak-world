    description: 菲惹港坐落於風息群島主島群東北島，是群島貿易中樞與開拓先鋒
  - target: thalassa
    type: physical
    direction: 西北方
    description: 渡船與帆船連接菲惹港與塔拉薩  # inferred: true
  - target: anchora
    type: physical
    direction: 東南方
    description: 渡船與帆船連接菲惹港與昂科拉  # inferred: true
  - target: aeolis
    type: physical
    direction: 西南方
    description: 渡船與帆船連接菲惹港與艾歐利斯  # inferred: true

# ── 內容物（contents）──
