    name: 巨型碼頭（Grand Dock）
    location: 潟湖東北岸
    description: >
      巨型碼頭延伸到潟湖之中，桅杆如林。
      各國商船在此停泊、卸貨與補給，
      是風息群島與外界貿易的首要門戶。  # inferred: true

